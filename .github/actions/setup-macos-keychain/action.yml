name: Setup macOS Code Signing Keychain
description: Creates an ephemeral `build.keychain` for ad-hoc codesigning in CI — macOS only

runs:
  using: composite
  steps:
    - name: Create build.keychain
      shell: bash
      run: |
        # Create temporary keychain for code signing.
        # Required for ad-hoc signing (codesign --sign -) in CI environment.
        security create-keychain -p actions build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p actions build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
