name: NAPI 1. iocraft

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no release)'
        type: boolean
        default: true
      force:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false
      build_mode:
        description: 'Build mode'
        type: choice
        options:
          - prod
          - dev
        default: prod
      debug:
        description: 'Debug (0|1|namespace[,...])'
        type: string
        default: '0'
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: true
      force:
        type: boolean
        default: false
      build_mode:
        type: string
        default: prod
      debug:
        type: string
        default: '0'

permissions:
  contents: read # Read repository contents

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build iocraft (${{ matrix.os }}-${{ matrix.arch }})
    permissions:
      contents: read # Read repository contents
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: darwin
            arch: x64
            runner: depot-macos-15
            target: x86_64-apple-darwin
            cross_compile: true
          - os: darwin
            arch: arm64
            runner: depot-macos-15
            target: aarch64-apple-darwin
          - os: win32
            arch: x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Don't clone all submodules - only iocraft is initialized below.
          submodules: false

      - name: Initialize iocraft submodule
        run: |
          git submodule update --init packages/iocraft-builder/upstream/iocraft

      - name: Enable debug logging
        if: inputs.debug != '0'
        env:
          DEBUG_INPUT: ${{ inputs.debug }}
        run: |
          if [ "$DEBUG_INPUT" = "1" ]; then
            echo "ACTIONS_STEP_DEBUG=true" >> $GITHUB_ENV
            echo "ACTIONS_RUNNER_DEBUG=true" >> $GITHUB_ENV
            echo "Debug mode: full"
          else
            # Use heredoc syntax to prevent env var injection via newlines
            {
              echo "DEBUG<<EOF"
              echo "$DEBUG_INPUT"
              echo "EOF"
            } >> $GITHUB_ENV
            echo "Debug mode: $DEBUG_INPUT"
          fi
        shell: bash

      - name: Load tool versions
        id: tool-versions
        run: |
          NODE_VERSION=$(cat .node-version | tr -d '\n')
          IOCRAFT_VERSION=$(jq -r '.sources.iocraft.version' packages/iocraft-builder/package.json)
          echo "node-version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "iocraft-version=$IOCRAFT_VERSION" >> $GITHUB_OUTPUT
          echo "Loaded Node.js: $NODE_VERSION, iocraft: $IOCRAFT_VERSION"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.tool-versions.outputs.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        # Note: version is specified in package.json packageManager field, not here

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (stable)
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: packages/iocraft-builder -> target
          prefix-key: iocraft-${{ matrix.os }}-${{ matrix.arch }}

      - name: Set build mode
        id: build-mode
        env:
          INPUT_BUILD_MODE: ${{ inputs.build_mode }}
        run: |
          # Sanitize input - only allow 'prod' or 'dev'
          if [ "$INPUT_BUILD_MODE" = "dev" ]; then
            BUILD_MODE="dev"
          else
            BUILD_MODE="prod"
          fi
          echo "mode=$BUILD_MODE" >> $GITHUB_OUTPUT
          echo "Build mode: $BUILD_MODE"
        shell: bash

      - name: Load cache version from centralized config
        id: cache-version
        shell: bash
        run: |
          CACHE_VERSION=$(jq -r '.versions["iocraft"]' .github/cache-versions.json)
          if [ -z "$CACHE_VERSION" ] || [ "$CACHE_VERSION" = "null" ]; then
            echo "× Error: Cache version not found for iocraft in .github/cache-versions.json"
            exit 1
          fi
          echo "version=$CACHE_VERSION" >> $GITHUB_OUTPUT
          echo "Cache version: $CACHE_VERSION"

      - name: Generate iocraft cache key
        id: cache-key
        env:
          CACHE_VERSION: ${{ steps.cache-version.outputs.version }}
        run: |
          # Cross-platform hash function.
          if command -v shasum &> /dev/null; then
            hash_cmd="shasum -a 256"
          elif command -v sha256sum &> /dev/null; then
            hash_cmd="sha256sum"
          else
            echo "Error: No SHA-256 command found"
            exit 1
          fi

          # Hash key files
          CARGO_TOML=$($hash_cmd packages/iocraft-builder/Cargo.toml | cut -d' ' -f1)
          PACKAGE_JSON=$($hash_cmd packages/iocraft-builder/package.json | cut -d' ' -f1)
          BUILD_RS=$($hash_cmd packages/iocraft-builder/build.rs | cut -d' ' -f1)
          LIB_RS=$($hash_cmd packages/iocraft-builder/src/lib.rs | cut -d' ' -f1)

          # Combined hash
          FINAL_HASH=$(echo "${CACHE_VERSION}${CARGO_TOML}${PACKAGE_JSON}${BUILD_RS}${LIB_RS}" | $hash_cmd | cut -d' ' -f1)

          echo "cache_version=${CACHE_VERSION}" >> $GITHUB_OUTPUT
          echo "final_hash=${FINAL_HASH}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Restore iocraft checkpoint cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: iocraft-checkpoint-cache
        if: ${{ !inputs.force }}
        with:
          path: |
            packages/iocraft-builder/build/${{ steps.build-mode.outputs.mode }}/checkpoints
          key: iocraft-checkpoints-${{ steps.cache-key.outputs.cache_version }}-v${{ steps.tool-versions.outputs.iocraft-version }}-${{ matrix.os }}-${{ matrix.arch }}-${{ steps.build-mode.outputs.mode }}-${{ steps.cache-key.outputs.final_hash }}

      - name: Build iocraft native module
        id: build
        if: steps.iocraft-checkpoint-cache.outputs.cache-hit != 'true'
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          TARGET: ${{ matrix.target }}
        run: |
          cd packages/iocraft-builder

          # Build with cargo/napi-rs
          if [ "$BUILD_MODE" = "prod" ]; then
            cargo build --release --target $TARGET
            ARTIFACT_DIR="target/$TARGET/release"
          else
            cargo build --target $TARGET
            ARTIFACT_DIR="target/$TARGET/debug"
          fi

          # Create output directory
          mkdir -p build/$BUILD_MODE/out/Final

          # Copy artifacts
          if [ "${{ matrix.os }}" = "win32" ]; then
            cp $ARTIFACT_DIR/iocraft_node.dll build/$BUILD_MODE/out/Final/iocraft.node
          elif [ "${{ matrix.os }}" = "darwin" ]; then
            cp $ARTIFACT_DIR/libiocraft_node.dylib build/$BUILD_MODE/out/Final/iocraft.node
          else
            cp $ARTIFACT_DIR/libiocraft_node.so build/$BUILD_MODE/out/Final/iocraft.node
          fi

          # Create checkpoint
          mkdir -p build/$BUILD_MODE/checkpoints
          date > build/$BUILD_MODE/checkpoints/native-built

          echo "Build complete"
          ls -lh build/$BUILD_MODE/out/Final/
        shell: bash

      - name: Validate build output
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
        run: |
          echo "Validating iocraft build output..."

          if [ ! -f "packages/iocraft-builder/build/${BUILD_MODE}/out/Final/iocraft.node" ]; then
            echo "× Build failed: Native module missing"
            echo "Expected path: packages/iocraft-builder/build/${BUILD_MODE}/out/Final/iocraft.node"
            exit 1
          fi

          NODE_SIZE=$(stat -c%s "packages/iocraft-builder/build/${BUILD_MODE}/out/Final/iocraft.node" 2>/dev/null || stat -f%z "packages/iocraft-builder/build/${BUILD_MODE}/out/Final/iocraft.node")
          if [ "$NODE_SIZE" -lt 10000 ]; then
            echo "× Build failed: Native module too small ($NODE_SIZE bytes)"
            exit 1
          fi

          echo "✅ Build validation passed"
          ls -lh "packages/iocraft-builder/build/${BUILD_MODE}/out/Final/"
        shell: bash

      - name: Upload iocraft artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: iocraft-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/iocraft-builder/build/${{ steps.build-mode.outputs.mode }}/out/Final/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Release iocraft
    needs: build
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    runs-on: ubuntu-24.04
    environment: release # Dedicated environment for secret access with approval gates
    permissions:
      contents: write # Required to create GitHub releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: |
            packages/iocraft-builder/package.json
            .github/scripts/generate-version.sh
          sparse-checkout-cone-mode: false

      - name: Load iocraft version from package.json
        id: tool-versions
        run: |
          IOCRAFT_VERSION=$(jq -r '.sources.iocraft.version' packages/iocraft-builder/package.json)
          echo "iocraft-version=$IOCRAFT_VERSION" >> $GITHUB_OUTPUT
          echo "Loaded iocraft: $IOCRAFT_VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts/

      - name: Generate version
        id: version
        run: |
          source .github/scripts/generate-version.sh
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Prepare release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p release

          # Rename artifacts with version and platform info
          for dir in artifacts/iocraft-*/; do
            PLATFORM=$(basename "$dir" | sed 's/iocraft-//')
            # Transform win32 → win for consistency with other tools.
            PLATFORM=$(echo "$PLATFORM" | sed 's/^win32-/win-/')
            cp "$dir/iocraft.node" "release/iocraft-${VERSION}-${PLATFORM}.node"
          done

          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          $(command -v shasum &> /dev/null && echo "shasum -a 256" || echo "sha256sum") iocraft-*.node > checksums.txt
          cat checksums.txt

      - name: Import GPG key
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            echo "GPG key imported successfully"
          else
            echo "⚠️  GPG_PRIVATE_KEY secret not set, skipping signature"
          fi

      - name: Sign checksums
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            cd release
            if [ -n "$GPG_PASSPHRASE" ]; then
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --detach-sign --armor checksums.txt
            else
              gpg --batch --yes --detach-sign --armor checksums.txt
            fi
            echo "[OK] Created checksums.txt.asc"
            ls -lh checksums.txt.asc
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}
          IOCRAFT_VERSION: ${{ steps.tool-versions.outputs.iocraft-version }}
        run: |
          VERSION="${STEPS_VERSION_OUTPUTS_VERSION}"
          RELEASE_NAME="iocraft"
          TAG="${RELEASE_NAME}-${VERSION}"

          # Check if release already exists
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, uploading assets..."
            UPLOAD_ARGS="release/iocraft-*.node release/checksums.txt"

            # Add signature if it exists
            if [ -f release/checksums.txt.asc ]; then
              UPLOAD_ARGS="$UPLOAD_ARGS release/checksums.txt.asc"
            fi

            gh release upload "$TAG" $UPLOAD_ARGS --clobber
          else
            echo "Creating new release $TAG..."
            # Extract date-hash from tag for title
            TITLE_SUFFIX="${TAG#iocraft-}"
            gh release create "$TAG" \
              --title "iocraft ${TITLE_SUFFIX}" \
              --notes "iocraft v${IOCRAFT_VERSION} native Node.js bindings via napi-rs.

          ## Files
          - \`iocraft-${VERSION}-linux-x64.node\` - Linux x64 native module
          - \`iocraft-${VERSION}-linux-arm64.node\` - Linux ARM64 native module
          - \`iocraft-${VERSION}-darwin-x64.node\` - macOS Intel native module
          - \`iocraft-${VERSION}-darwin-arm64.node\` - macOS Apple Silicon native module
          - \`iocraft-${VERSION}-win-x64.node\` - Windows x64 native module
          - \`checksums.txt\` - SHA256 checksums

          ## Usage
          Load the native module in your Node.js project:
          \`\`\`javascript
          const iocraft = require('./iocraft-${VERSION}-\${platform}-\${arch}.node');
          \`\`\`" \
              release/iocraft-*.node \
              release/checksums.txt \
              $([ -f release/checksums.txt.asc ] && echo "release/checksums.txt.asc" || echo "")
          fi
