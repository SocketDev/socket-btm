# This file is intentionally minimal.
#
# The real source of truth for rustflags lives in scripts/build.mts
# (IOCRAFT_PERF_RUSTFLAGS + path-remap flags from build-infra). Cargo's
# precedence rules pick exactly ONE rustflags source — RUSTFLAGS /
# CARGO_ENCODED_RUSTFLAGS overrides every config.toml entry without merging —
# so duplicating perf flags here would silently drop them whenever build.mts
# sets the env var (which it always does, to anonymize build-host paths in
# DWARF + __FILE__ macros for the shipped .node addon).
#
# If you need to add a flag, add it to IOCRAFT_PERF_RUSTFLAGS in build.mts.
