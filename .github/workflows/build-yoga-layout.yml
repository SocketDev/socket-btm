name: Build Yoga Layout WASM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/yoga-layout-builder/**'
      - '.github/workflows/build-yoga-layout.yml'
  pull_request:
    paths:
      - 'packages/yoga-layout-builder/**'
      - '.github/workflows/build-yoga-layout.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.20.0'
  USE_CACHE: ${{ vars.USE_CACHE != 'false' }}

permissions:
  contents: read

concurrency:
  group: build-yoga-layout-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-yoga-layout:
    name: Build Yoga Layout WASM
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate cache key
        id: cache-key
        shell: bash
        run: |
          # Generate content-based hash from source and scripts
          HASH=$(find packages/yoga-layout-builder/src packages/yoga-layout-builder/scripts -type f 2>/dev/null | sort | xargs shasum -a 256 2>/dev/null | shasum -a 256 | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Cache key hash: $HASH"

      - name: Restore Yoga source cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: source-cache
        uses: actions/cache@v4
        with:
          path: packages/yoga-layout-builder/build/yoga-source
          key: yoga-source-v3.1.0-${{ steps.cache-key.outputs.hash }}
          restore-keys: yoga-source-v3.1.0-

      - name: Restore WASM build cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: packages/yoga-layout-builder/build/wasm
          key: yoga-wasm-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: yoga-wasm-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore checkpoints cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: checkpoints-cache
        uses: actions/cache@v4
        with:
          path: packages/yoga-layout-builder/build/checkpoints
          key: yoga-checkpoints-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: yoga-checkpoints-${{ runner.os }}-${{ runner.arch }}-

      - name: Build Yoga Layout WASM
        run: pnpm --filter yoga-layout-builder build

      - name: Verify WASM artifacts
        shell: bash
        run: |
          echo "Verifying Yoga Layout WASM build artifacts"
          WASM_FILE="packages/yoga-layout-builder/build/wasm/yoga.wasm"
          JS_FILE="packages/yoga-layout-builder/build/wasm/yoga.js"

          if [ -f "$WASM_FILE" ]; then
            SIZE=$(du -h "$WASM_FILE" | cut -f1)
            echo "✓ WASM file: $SIZE"
            file "$WASM_FILE"
          else
            echo "✗ WASM file not found: $WASM_FILE"
            exit 1
          fi

          if [ -f "$JS_FILE" ]; then
            SIZE=$(du -h "$JS_FILE" | cut -f1)
            echo "✓ JS file: $SIZE"
          else
            echo "✗ JS file not found: $JS_FILE"
            exit 1
          fi

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yoga-layout-wasm
          path: |
            packages/yoga-layout-builder/build/wasm/yoga.wasm
            packages/yoga-layout-builder/build/wasm/yoga.js
          retention-days: 30
          if-no-files-found: error
