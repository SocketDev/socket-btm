# Patch format allowlist for check-patch-format.mts.
#
# Each entry opts a specific patch file out of a specific format rule.
# Entries require a `reason` field so future readers can audit whether
# the exception is still valid — when it's not, the entry (and the
# underlying patch filename/content) should be updated, not the rule
# loosened.
#
# Format:
#   - file: <path relative to repo root>
#     rule: <rule id from scripts/check-patch-format.mts>
#     reason: <one-paragraph justification>

- file: packages/node-smol-builder/patches/source-patched/016-http-server-wire.patch
  rule: numbered-series-gap
  reason: "Patch 015 was intentionally removed during R17 (see earlier quality-loop notes). Renumbering 016-022 down to 015-021 would rewrite every subsequent patch filename, break external references in skill/reference docs, and provide no functional benefit — the build applies patches in filename-sort order, which is insensitive to gaps. Keep the gap and document it here so check-patch-format.mts doesn't flag it every CI run."

- file: packages/node-smol-builder/patches/source-patched/027-smol-util-binding.patch
  rule: numbered-series-gap
  reason: "Patch 026 (smol-power-node-gyp) was folded into 004-node-gyp-smol-sources.patch as part of the per-binding-patch cleanup. Same renumber-vs-keep-gap tradeoff as patch 016 — keep the gap to avoid rewriting downstream filenames."

- file: packages/node-smol-builder/patches/source-patched/031-smol-primordial-binding.patch
  rule: numbered-series-gap
  reason: "Patch 030 (smol-util-node-gyp) was folded into 004-node-gyp-smol-sources.patch as part of the per-binding-patch cleanup. Same rationale as patch 027's gap entry."

- file: packages/node-smol-builder/patches/source-patched/035-smol-versions-native-binding.patch
  rule: numbered-series-gap
  reason: "Patch 034 (smol-primordial-node-gyp) was folded into 004-node-gyp-smol-sources.patch as part of the per-binding-patch cleanup. Same rationale as patch 027's gap entry."

# ─── multiple-patches-per-file: pre-existing convention violations ─────
#
# CLAUDE.md "Patch Rules" requires one patch per source file across the
# entire patch series. The `multiple-patches-per-file` rule enforces this
# at CI time. The entries below grandfather pre-existing violations while
# we plan a cleanup: smol-power (023-026), smol-util (027-030), and
# smol-primordial (031-034) each have 4 sibling patches that touch the
# same 4 source files (src/node_binding.cc, lib/internal/bootstrap/realm.js,
# src/node_external_reference.h, node.gyp).
#
# The right cleanup is to fold all per-binding patches into the canonical
# multi-binding patches that already exist (018-smol-builtin-bindings,
# 003-realm-smol-bindings, 020-smol-external-refs, 004-node-gyp-smol-sources).
# Tracked separately — not in this commit because it touches landed work.
#
# When the cleanup lands, delete these allowlist entries.

