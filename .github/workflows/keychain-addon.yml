name: Keychain addon

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (plain X.Y.Z, chosen by the maintainer)'
        type: string
        required: true
      dry-run:
        description: 'Dry run (build and verify only)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: keychain-addon / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-15, target: darwin-arm64 }
          - { runner: macos-15-intel, target: darwin-x64 }
          - { runner: ubuntu-24.04-arm, target: linux-arm64 }
          - { runner: ubuntu-24.04, target: linux-x64 }
          - { runner: windows-2022, target: win32-x64 }
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          persist-credentials: false
      - uses: ./.github/actions/fleet/setup-and-install
      - name: Validate release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node --input-type=module -e 'import("./packages/keychain-addon-builder/scripts/stage-release.mts").then(({ validateVersion }) => validateVersion(process.env.RELEASE_VERSION))'
      - name: Install Linux Keychain toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsecret-1-dev pkg-config
      - name: Build native addon
        env:
          BUILD_MODE: prod
        run: pnpm --filter keychain-addon-builder build
      - name: Load-test native addon
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          node -e 'const p="./packages/keychain-addon-builder/build/prod/"+process.env.TARGET+"/out/Final/keychain.node"; const k=require(p); if (k.get("socket-keychain-release-probe", "missing") !== undefined) process.exit(1); k.del("socket-keychain-release-probe", "missing")'
      - name: Stage verified release asset
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          node packages/keychain-addon-builder/scripts/stage-release.mts \
            "$RELEASE_VERSION" \
            "$TARGET" \
            "packages/keychain-addon-builder/build/prod/$TARGET/out/Final/keychain.node" \
            dist
      - name: Upload verified asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (2026-05-15)
        with:
          name: keychain-addon-${{ matrix.target }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  release:
    name: Release Keychain addon
    needs: build
    if: github.event_name == 'workflow_dispatch' && !inputs.dry-run
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
    steps:
      - name: Download verified assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (2026-05-15)
        with:
          path: release
          pattern: keychain-addon-*
          merge-multiple: true
      - name: Verify complete release set
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          cd release
          expected=(darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-x64)
          for target in "${expected[@]}"; do
            test -f "keychain-addon-${RELEASE_VERSION}-${target}.node"
            test -f "keychain-addon-${RELEASE_VERSION}-${target}.node.sha256"
          done
          cat ./*.sha256 > checksums.txt
          sha256sum --check checksums.txt
          test "$(find . -maxdepth 1 -name 'keychain-addon-*.node' | wc -l)" -eq 5
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release create "keychain-addon-v${RELEASE_VERSION}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "Keychain addon v${RELEASE_VERSION}" \
            --notes "Cross-platform N-API bindings for the operating-system credential store."
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          gh release upload "keychain-addon-v${RELEASE_VERSION}" \
            release/keychain-addon-*.node \
            release/checksums.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: gh release edit "keychain-addon-v${RELEASE_VERSION}" --draft=false
