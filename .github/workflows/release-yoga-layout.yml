name: Release Yoga Layout WASM

on:
  push:
    tags:
      - 'yoga-layout-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 3.1.0)'
        required: true
        type: string
      publish:
        description: 'Publish release (not draft)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.20.0'

permissions:
  contents: write

concurrency:
  group: release-yoga-layout-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build or Use Cached WASM
    uses: ./.github/workflows/build-yoga-layout.yml
    with:
      force: false

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: yoga-layout-wasm
          path: packages/yoga-layout-builder/build/wasm/

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
          PUBLISH: ${{ github.event.inputs.publish || 'false' }}
        run: |
          # Extract version from tag (yoga-layout-v3.1.0 -> 3.1.0)
          VERSION_NUM="${VERSION#yoga-layout-v}"

          # Create release draft
          gh release create "yoga-layout-v${VERSION_NUM}" \
            --title "Yoga Layout WASM v${VERSION_NUM}" \
            --notes "Yoga Layout WebAssembly build optimized for Socket CLI." \
            ${PUBLISH:+--draft=false} \
            ${PUBLISH:-

--draft} \
            packages/yoga-layout-builder/build/wasm/yoga.wasm \
            packages/yoga-layout-builder/build/wasm/yoga.js
