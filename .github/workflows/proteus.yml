name: Proteus

# Build + release the proteus credential-broker daemon. Standalone (NOT part of
# the node-smol SMOL chain): proteus is a small per-platform daemon, so this is a
# lean matrix build + an immutable 3-step GitHub Release — no Depot, submodules,
# or checkpoint caching. Manual-dispatch only; `dry-run` builds without releasing.
#
# NOTE: the per-platform toolchain steps below are CI-validated (run a `dry-run`
# first). musl + win32-arm64 are follow-ups once the core matrix is green.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (build only, no release)'
        type: boolean
        default: true
      build-mode:
        description: 'Build mode'
        type: choice
        options:
          - prod
          - dev
        default: prod

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-proteus:
    name: proteus / ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest, platform: darwin, arch: arm64 }
          - { runner: macos-13, platform: darwin, arch: x64 }
          - { runner: ubuntu-latest, platform: linux, arch: x64 }
          - { runner: ubuntu-24.04-arm, platform: linux, arch: arm64 }
          - { runner: windows-latest, platform: win32, arch: x64 }
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          persist-credentials: false
      - uses: ./.github/actions/fleet/setup
      - uses: ./.github/actions/fleet/install

      # Per-platform keystore toolchain. macOS frameworks ship with the SDK;
      # Linux needs libsecret headers; Windows builds the daemon with MinGW (the
      # Makefile.win uses gcc) — Credential Manager (advapi32) ships with the SDK.
      - name: Install Linux keystore toolchain
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev pkg-config
      - name: Install Windows toolchain (MinGW)
        if: matrix.platform == 'win32'
        run: choco install mingw -y

      - name: Build proteus
        env:
          BUILD_MODE: ${{ inputs.build-mode }}
        run: pnpm --filter proteus-builder build

      - name: Stage + checksum the binary
        id: stage
        shell: bash
        env:
          PLATFORM_ARCH: ${{ matrix.platform }}-${{ matrix.arch }}
        run: |
          ext=""
          [ "${{ matrix.platform }}" = "win32" ] && ext=".exe"
          src="packages/proteus-builder/build/${{ inputs.build-mode }}/${PLATFORM_ARCH}/out/Final/proteus${ext}"
          out="proteus-${PLATFORM_ARCH}${ext}"
          mkdir -p dist
          cp "$src" "dist/${out}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${out}" > "dist/${out}.sha256"
          else
            shasum -a 256 "dist/${out}" > "dist/${out}.sha256"
          fi
          echo "artifact=${out}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (2026-05-15)
        with:
          name: ${{ steps.stage.outputs.artifact }}
          path: dist/
          retention-days: 7

  release:
    name: Release
    needs: build-proteus
    if: github.event_name == 'workflow_dispatch' && !inputs.dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (2026-05-15)
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release tag + aggregate checksums
        id: tag
        shell: bash
        run: |
          TAG="proteus-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          cd artifacts
          cat *.sha256 > checksums.txt
          cat checksums.txt

      # Immutable release: create as a draft, upload assets, then publish. The
      # single-call form races the Sigstore attestation (immutable-release-guard).
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --draft \
            --title "proteus ${RELEASE_TAG#proteus-}" \
            --notes "proteus credential-broker daemon — per-platform binaries."
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: gh release upload "${RELEASE_TAG}" artifacts/proteus-* artifacts/checksums.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: gh release edit "${RELEASE_TAG}" --draft=false
