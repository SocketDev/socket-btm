# Wait 7 days (10080 minutes) before installing newly published packages.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@anthropic-ai/claude-code@2.1.92'
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'

packages:
  - packages/*

catalog:
  '@anthropic-ai/claude-code': 2.1.92
  '@babel/core': 7.28.4
  '@babel/types': 7.28.5
  '@biomejs/biome': 2.2.4
  '@dotenvx/dotenvx': 1.31.0
  '@socketsecurity/lib': 5.15.0
  '@types/adm-zip': 0.5.7
  '@types/node': 24.9.2
  '@vitest/coverage-v8': 4.0.3
  acorn: 8.14.0
  acorn-walk: 8.3.4
  adm-zip: 0.5.16
  del-cli: 6.0.0
  ecc-agentshield: 1.4.0
  esbuild: 0.25.11
  magic-string: 0.30.19
  octokit: 5.0.5
  postject: 1.0.0-alpha.6
  tar: 7.4.3
  vitest: 4.0.3
  yoctocolors-cjs: 2.1.3
  zod: 4.3.6

# Packages allowed to run build scripts (pnpm v11 strictDepBuilds default).
allowBuilds:
  esbuild: true
  onnxruntime-node: true

# Dependency overrides (migrated from package.json pnpm.overrides).
overrides:
  vite: '7.3.2'
