# Resolve to the highest version that satisfies the range, fleet-wide.
resolutionMode: highest

# Wait 7 days (10080 minutes) before installing newly published packages.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  # pnpm@11.5.0 — bumped via `Allow minimumReleaseAge bypass`. Fixes
  # the runner-side setup-and-install version mismatch (socket-registry's
  # pinned action ships 11.3.0, fleet packageManager was 11.4.0; aligning
  # everyone at 11.5.0). Out of soak 2026-06-05.
  # `pnpm` is the JS-only entry; `@pnpm/exe` is the SEA binary that
  # `packageManager: pnpm@X` resolves through corepack. Both gate the
  # shell-quote AST parser used by .claude/hooks/_shared/shell-command.mts
  # — fleet hook needs it now; soak entry expires 2026-05-29.
  - 'shell-quote'
  # compromise@14.15.1 is the attested re-publish that clears the
  # trust-downgrade flag on 14.15.0. Soak-bypass scoped to the exact
  # tag; future 14.15.2 still goes through normal 7-day soak.
  - '@redwoodjs/agent-ci'
  - 'dtu-github-actions'
  - '@socketdev/*'
  - 'ecc-agentshield'
  - 'sfw'
  - 'socket-*'
  # untracked@1.6.1 — Kikobeats/untracked, dev-only tool for autogenerating
  # `.dockerignore` from package.json + the curated blacklist. Used to keep
  # the Docker build context lean across vendored upstream trees (LIEF, zstd,
  # etc.) that ship 100+ MB of markup files compile never reads.
  - '@stuie/*'
  - '@ultrathink/*'
  - '@yuku-parser/*'
  - '@socketoverride/*'
  - 'socket'
