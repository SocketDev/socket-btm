name: SMOL 1. libpq

# libpq publish workflow. Builds PostgreSQL libpq + dependencies as a
# static library across the SMOL platform matrix. No Dockerfile in
# libpq-builder — all-native CMake build everywhere.
#
# Templated from .github/workflows/lief.yml with simplifications:
#   - No Linux Docker build (libpq-builder has no Dockerfile)
#   - No musl matrix entries (libpq is glibc-only currently)
#   - Single FINALIZED checkpoint chain (libpq has no upstream
#     socket-btm dependencies)
#   - Single artifact (libpq.a) + headers
#
# Consumed by: node-smol-builder (smol_postgres binding linkage).

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (build only, no release)'
        type: boolean
        default: true
      force:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false
      build-mode:
        description: 'Build mode'
        type: choice
        options:
          - prod
          - dev
        default: prod
      debug:
        description: 'Debug (0|1|namespace[,...])'
        type: string
        default: '0'
  workflow_call:
    inputs:
      dry-run:
        type: boolean
        default: true
      force:
        type: boolean
        default: false
      build-mode:
        type: string
        default: prod
      debug:
        type: string
        default: '0'

permissions:
  contents: read

env:
  HOMEBREW_NO_ANALYTICS: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-libpq:
    permissions:
      contents: read
    name: libpq / ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds — depot-macos-15 = 8 vCPU M2, 24GB RAM.
          - runner: depot-macos-15
            platform: darwin
            arch: arm64
            os: macos
          - runner: depot-macos-15
            platform: darwin
            arch: x64
            os: macos
          # Linux (glibc only — libpq's CMake config currently doesn't
          # produce musl-compatible static linkage; musl matrix can be
          # added in a follow-up bump once verified).
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            os: linux
            libc: glibc
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            os: linux
            libc: glibc
          # No Windows matrix — PostgreSQL's libpq on Windows is
          # built via MSBuild or meson, not autotools. The bundled
          # `./configure` shell script doesn't execute under Windows
          # cmd / PowerShell (ENOENT on spawn even with MinGW present).
          # node-smol's PostgreSQL integration is Linux + macOS only
          # for now; Windows libpq can be added behind a separate
          # meson-driven build script when the consumer needs it.

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          persist-credentials: false
          # Don't clone all submodules; postgres is initialized below on cache-miss.
          submodules: false

      - name: Enable debug logging
        uses: ./.github/actions/enable-debug-logging
        with:
          debug: ${{ inputs.debug }}

      - uses: SocketDev/socket-registry/.github/actions/setup@f58e7ae37e486876c326366668e1b2a90ce193c3 # main (2026-06-01)
      - uses: SocketDev/socket-registry/.github/actions/install@f58e7ae37e486876c326366668e1b2a90ce193c3 # main (2026-06-01)

      - name: Load cache version from centralized config
        id: cache-version
        uses: ./.github/actions/load-cache-version
        with:
          package-name: libpq

      - name: Generate libpq cache key
        id: cache-key
        env:
          CACHE_VERSION: ${{ steps.cache-version.outputs.version }}
        shell: bash
        run: |
          # Cross-platform hash function.
          if command -v shasum &> /dev/null; then
            hash_cmd="shasum -a 256"
          elif command -v sha256sum &> /dev/null; then
            hash_cmd="sha256sum"
          else
            echo "Error: No SHA-256 command found"
            exit 1
          fi

          # Hash critical inputs. libpq-builder has no Dockerfile so
          # skip docker-hash entirely. Mirror the lief.yml composition
          # for everything else.
          BUILD_SCRIPTS_HASH=$(find packages/libpq-builder/scripts -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          BUILD_INFRA_LIB=$(find packages/build-infra/lib -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          BIN_INFRA_LIB=$(find packages/bin-infra/lib -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          BUILD_INFRA_EXTERNAL_TOOLS=$($hash_cmd packages/build-infra/external-tools.json 2>/dev/null | cut -d' ' -f1)
          BUILD_INFRA_SCRIPTS=$(find packages/build-infra/scripts -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          PNPM_LOCK_HASH=$($hash_cmd pnpm-lock.yaml 2>/dev/null | cut -d' ' -f1)
          NODE_VERSION_HASH=$($hash_cmd .node-version 2>/dev/null | cut -d' ' -f1)
          # Submodule SHA — read via git ls-tree HEAD so cache-key
          # computes WITHOUT requiring the submodule to be initialized.
          POSTGRES_SUBMODULE_SHA=$(git ls-tree HEAD packages/libpq-builder/upstream/postgres 2>/dev/null | awk '{print $3}')
          ROOT_PACKAGE_JSON=$($hash_cmd package.json 2>/dev/null | cut -d' ' -f1)
          PNPM_WORKSPACE=$($hash_cmd pnpm-workspace.yaml 2>/dev/null | cut -d' ' -f1)
          LIBPQ_PACKAGE_JSON=$($hash_cmd packages/libpq-builder/package.json 2>/dev/null | cut -d' ' -f1)
          # Socket-registry propagation SHA — extracted from this
          # workflow's own YAML.
          WORKFLOW_FILE="${GITHUB_WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE#${GITHUB_REPOSITORY}/}"
          SOCKET_REGISTRY_SHA=$(grep -ohE 'SocketDev/socket-registry/[^@]+@[0-9a-f]{40}' "$WORKFLOW_FILE" 2>/dev/null | head -1 | grep -oE '[0-9a-f]{40}$' || echo "")

          FINAL_HASH=$(echo "${CACHE_VERSION}${BUILD_SCRIPTS_HASH}${BUILD_INFRA_LIB}${BIN_INFRA_LIB}${BUILD_INFRA_EXTERNAL_TOOLS}${BUILD_INFRA_SCRIPTS}${PNPM_LOCK_HASH}${NODE_VERSION_HASH}${POSTGRES_SUBMODULE_SHA}${ROOT_PACKAGE_JSON}${PNPM_WORKSPACE}${LIBPQ_PACKAGE_JSON}${SOCKET_REGISTRY_SHA}" | $hash_cmd | cut -d' ' -f1)

          echo "cache_version=${CACHE_VERSION}" >> $GITHUB_OUTPUT
          echo "final_hash=${FINAL_HASH}" >> $GITHUB_OUTPUT
          echo "Cache key hash: ${FINAL_HASH}"

      - name: Set build mode
        id: build-mode
        uses: ./.github/actions/set-build-mode
        with:
          build-mode: ${{ inputs['build-mode'] }}

      - name: Set platform-arch for cache
        id: platform-arch-cache
        uses: ./.github/actions/set-platform-arch
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          libc: ${{ matrix.libc }}

      # Hoist canonical libpq paths into step outputs so subsequent
      # steps read from one place.
      - name: Compute libpq paths
        id: paths
        shell: bash
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          PLATFORM_ARCH: ${{ steps.platform-arch-cache.outputs.platform_arch }}
        run: |
          PACKAGE_DIR="packages/libpq-builder"
          MODE_BUILD_DIR="${PACKAGE_DIR}/build/${BUILD_MODE}"
          PLATFORM_BUILD_DIR="${MODE_BUILD_DIR}/${PLATFORM_ARCH}"
          FINAL_DIR="${PLATFORM_BUILD_DIR}/out/Final"
          # libpq-builder's copyDistributionFiles() lands the static
          # library + headers under `out/Final/libpq/dist/`, not under
          # the `libpq` dir directly. The `dist/` segment is the
          # PostgreSQL `--prefix` install root passed to configure.
          LIBPQ_DIR="${FINAL_DIR}/libpq/dist"
          CHECKPOINTS_DIR="${PLATFORM_BUILD_DIR}/checkpoints"
          {
            echo "package_dir=${PACKAGE_DIR}"
            echo "mode_build_dir=${MODE_BUILD_DIR}"
            echo "platform_build_dir=${PLATFORM_BUILD_DIR}"
            echo "final_dir=${FINAL_DIR}"
            echo "libpq_dir=${LIBPQ_DIR}"
            echo "checkpoints_dir=${CHECKPOINTS_DIR}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore libpq checkpoint cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (2026-05-15)
        id: libpq-checkpoint-cache
        if: ${{ !inputs.force }}
        with:
          path: |
            packages/libpq-builder/build/shared/checkpoints
            ${{ steps.paths.outputs.checkpoints_dir }}
          key: libpq-checkpoints-${{ steps.cache-key.outputs.cache_version }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.build-mode.outputs.mode }}-${{ steps.cache-key.outputs.final_hash }}
          # No restore-keys — require exact match.

      - name: Set checkpoint chain for build mode
        id: checkpoint-chain
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
        shell: bash
        run: |
          CHAIN=$(node packages/libpq-builder/scripts/get-checkpoint-chain.mts --$BUILD_MODE)
          echo "checkpoint_chain=$CHAIN" >> $GITHUB_OUTPUT
          CHECKPOINTS=$(echo "$CHAIN" | tr ',' ' ')
          echo "checkpoints=$CHECKPOINTS" >> $GITHUB_OUTPUT
          echo "Checkpoint chain for $BUILD_MODE mode: $CHAIN"

      - name: Validate checkpoint cache integrity
        id: validate-cache
        if: steps.libpq-checkpoint-cache.outputs.cache-hit == 'true'
        uses: ./.github/actions/validate-checkpoints
        with:
          checkpoint-dirs: packages/libpq-builder/build/shared/checkpoints:${{ steps.paths.outputs.checkpoints_dir }}
          checkpoints: ${{ steps.checkpoint-chain.outputs.checkpoints }}
          package-name: libpq-builder

      - name: Restore build output from checkpoint chain
        id: restore-checkpoint
        uses: ./.github/actions/restore-checkpoint
        with:
          package-name: 'libpq-builder'
          build-mode: ${{ steps.build-mode.outputs.mode }}
          checkpoint-chain: ${{ steps.checkpoint-chain.outputs.checkpoint_chain }}
          cache-hit: ${{ steps.libpq-checkpoint-cache.outputs.cache-hit }}
          cache-valid: ${{ steps.validate-cache.outputs.valid }}
          platform-arch: ${{ steps.platform-arch-cache.outputs.platform_arch }}

      - name: Initialize postgres submodule
        # Cache-miss only — the cache-key uses git ls-tree HEAD so the
        # submodule does not need to be initialized to compute it.
        if: (steps.libpq-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true') || steps.restore-checkpoint.outputs.build-required == 'true' || inputs.force
        uses: ./.github/actions/init-submodules
        with:
          submodules: packages/libpq-builder/upstream/postgres

      - name: Setup build toolchain (macOS)
        if: |
          matrix.os == 'macos' &&
          ((steps.libpq-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        run: |
          # Retry to handle transient brew failures.
          for i in 1 2 3; do
            if brew install cmake ccache; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "× brew install failed after 3 attempts"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Setup build toolchain (Linux)
        if: |
          matrix.os == 'linux' &&
          ((steps.libpq-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ccache build-essential

      - name: Build libpq native
        if: |
          (steps.libpq-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true') ||
          steps.restore-checkpoint.outputs.build-required == 'true'
        shell: bash
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          TARGET_ARCH: ${{ matrix.arch }}
          # PLATFORM_ARCH is consumed by getCurrentPlatformArch() to
          # resolve the build output directory. Setting it explicitly
          # is the only reliable way to land output under the matrix
          # target when host != target — e.g. darwin-x64 on the M2
          # depot runner, where process.arch reports `arm64`.
          PLATFORM_ARCH: ${{ steps.platform-arch-cache.outputs.platform_arch }}
          # darwin-x64 on the M2 depot runner is cross-compile.
          # libpq-builder reads CROSS_COMPILE=1 to flip on the
          # `--host=x86_64-apple-darwin` autotools triple.
          CROSS_COMPILE: ${{ (matrix.os == 'macos' && matrix.arch == 'x64') && '1' || '' }}
        run: |
          cd packages/libpq-builder
          pnpm run build

      - name: Debug build output structure
        if: |
          (steps.libpq-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true') ||
          steps.restore-checkpoint.outputs.build-required == 'true'
        shell: bash
        env:
          PLATFORM_BUILD_DIR: ${{ steps.paths.outputs.platform_build_dir }}
          PACKAGE_DIR: ${{ steps.paths.outputs.package_dir }}
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
        run: |
          echo "Checking build output structure..."
          ls -lah "${PLATFORM_BUILD_DIR}/" || echo "Build directory does not exist"
          echo "Searching for libpq.a:"
          find "${PACKAGE_DIR}/build/${BUILD_MODE}/" -name "libpq.a" 2>/dev/null || echo "No libpq.a found"

      - name: Verify build output
        shell: bash
        env:
          LIBPQ_DIR: ${{ steps.paths.outputs.libpq_dir }}
        run: |
          if [ ! -f "${LIBPQ_DIR}/libpq.a" ]; then
            echo "× libpq.a not found at ${LIBPQ_DIR}/libpq.a"
            exit 1
          fi
          echo "✅ libpq.a found"

      - name: Create archive
        shell: bash
        env:
          LIBPQ_DIR: ${{ steps.paths.outputs.libpq_dir }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          cd "$LIBPQ_DIR"
          ARCHIVE_NAME="libpq-${PLATFORM}-${ARCH}"
          OUTPUT_PATH="../../../../../${ARCHIVE_NAME}.tar.gz"
          echo "Creating archive: ${ARCHIVE_NAME}.tar.gz"
          # libpq-builder's copyDistributionFiles lays out:
          #   dist/libpq.a            — PostgreSQL client library
          #   dist/libpgcommon.a      — shared utility code (link-required)
          #   dist/libpgport.a        — portability shims (link-required)
          #   dist/include/           — public headers
          # All three libs ship because the consuming gyp wrapper
          # (deps/libpq/libpq.gyp) links them together.
          tar -czf "${OUTPUT_PATH}" \
            libpq.a \
            libpgcommon.a \
            libpgport.a \
            include/
          echo "✅ Archive created"

      - name: Set artifact name
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          ARTIFACT_NAME="libpq-${PLATFORM}-${ARCH}"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Verify archive exists
        shell: bash
        env:
          MODE_BUILD_DIR: ${{ steps.paths.outputs.mode_build_dir }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
        run: |
          ARCHIVE_PATH="${MODE_BUILD_DIR}/${ARTIFACT_NAME}.tar.gz"
          if [ ! -f "$ARCHIVE_PATH" ]; then
            echo "× Archive not found at: $ARCHIVE_PATH"
            ls -lah "${MODE_BUILD_DIR}/" || echo "Build directory does not exist"
            exit 1
          fi
          echo "✅ Archive found: $ARCHIVE_PATH"
          ls -lh "$ARCHIVE_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (2026-05-15)
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ steps.paths.outputs.mode_build_dir }}/${{ env.ARTIFACT_NAME }}.tar.gz
          retention-days: 30
          if-no-files-found: error
          compression-level: 0

  release:
    name: Release libpq
    needs: build-libpq
    if: github.event_name == 'workflow_dispatch' && !inputs['dry-run']
    environment: release
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-15)
        with:
          persist-credentials: false
          sparse-checkout: |
            .gitmodules
            .github/scripts/generate-version.sh
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (2026-05-15)
        with:
          path: artifacts
          pattern: libpq-*
          merge-multiple: true

      - name: Verify downloaded artifacts
        shell: bash
        run: |
          if [ -d "artifacts" ] && [ -n "$(ls -A artifacts/*.tar.gz 2>/dev/null)" ]; then
            echo "✅ Found $(ls artifacts/*.tar.gz 2>/dev/null | wc -l) tar.gz files"
            ls -lah artifacts/
          else
            echo "× No artifacts found"
            exit 1
          fi

      - name: Get libpq version
        id: version
        shell: bash
        run: |
          # Extract version from .gitmodules comment.
          POSTGRES_VERSION=$(grep -B 1 'packages/libpq-builder/upstream/postgres' .gitmodules | grep '# postgres-' | sed 's/.*# postgres-//')
          if [ -z "$POSTGRES_VERSION" ]; then
            echo "Error: Failed to extract postgres version from .gitmodules"
            exit 1
          fi
          echo "version=${POSTGRES_VERSION}" >> $GITHUB_OUTPUT
          echo "libpq (postgres) version: ${POSTGRES_VERSION}"

      - name: Generate release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          source .github/scripts/generate-version.sh
          TAG="libpq-${VERSION}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          POSTGRES_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          mkdir -p release
          for file in artifacts/*.tar.gz; do
            if [ -f "$file" ]; then
              mv "$file" release/
            fi
          done

          if [ -z "$(ls -A release/*.tar.gz 2>/dev/null)" ]; then
            echo "Error: No .tar.gz files in release/ after move"
            exit 1
          fi

          cd release
          if command -v shasum &> /dev/null; then
            shasum -a 256 *.tar.gz > checksums.txt
          elif command -v sha256sum &> /dev/null; then
            sha256sum *.tar.gz > checksums.txt
          else
            echo "Error: No SHA-256 command found"
            exit 1
          fi
          cat checksums.txt
          cd ..

          TITLE_SUFFIX="${RELEASE_TAG#libpq-}"
          # Immutable-releases 3-step: draft → upload → publish.
          # Single-call form races the Sigstore attestation hash.
          # See docs/claude.md/fleet/immutable-releases.md.
          gh release create "${RELEASE_TAG}" \
            --draft \
            --title "libpq ${TITLE_SUFFIX}" \
            --notes "PostgreSQL libpq v${POSTGRES_VERSION} static library for SMOL.

          ## Platforms
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64

          ## Files
          Each platform archive contains:
          - Static libraries (\`libpq.a\`, \`libpgcommon.a\`, \`libpgport.a\`)
          - Header files (\`include/\` directory)

          Use \`checksums.txt\` to verify archive integrity."
          gh release upload "${RELEASE_TAG}" \
            release/*.tar.gz \
            release/checksums.txt
          gh release edit "${RELEASE_TAG}" --draft=false

  update-release-assets:
    needs: release
    if: github.event_name == 'workflow_dispatch' && !inputs['dry-run']
    permissions:
      contents: write
    uses: ./.github/workflows/update-release-assets.yml
    secrets:
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
