name: Build ONNX Runtime WASM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/onnxruntime-builder/**'
      - '.github/workflows/build-onnxruntime.yml'
  pull_request:
    paths:
      - 'packages/onnxruntime-builder/**'
      - '.github/workflows/build-onnxruntime.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.20.0'
  USE_CACHE: ${{ vars.USE_CACHE != 'false' }}

permissions:
  contents: read

concurrency:
  group: build-onnxruntime-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-onnxruntime:
    name: Build ONNX Runtime WASM
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate cache key
        id: cache-key
        shell: bash
        run: |
          # Generate content-based hash from patches and build scripts
          HASH=$(find packages/onnxruntime-builder/patches packages/onnxruntime-builder/scripts -type f \( -name "*.patch" -o -name "*.mjs" \) 2>/dev/null | sort | xargs shasum -a 256 2>/dev/null | shasum -a 256 | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Cache key hash: $HASH"

      - name: Restore ONNX Runtime source cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: source-cache
        uses: actions/cache@v4
        with:
          path: packages/onnxruntime-builder/build/onnxruntime-source
          key: onnxruntime-source-v1.21.1-${{ steps.cache-key.outputs.hash }}
          restore-keys: onnxruntime-source-v1.21.1-

      - name: Restore WASM build cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: packages/onnxruntime-builder/build/wasm
          key: onnxruntime-wasm-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: onnxruntime-wasm-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore checkpoints cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: checkpoints-cache
        uses: actions/cache@v4
        with:
          path: packages/onnxruntime-builder/build/checkpoints
          key: onnxruntime-checkpoints-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: onnxruntime-checkpoints-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build ONNX Runtime WASM
        run: pnpm --filter onnxruntime-builder build

      - name: Verify WASM artifacts
        shell: bash
        run: |
          echo "Verifying ONNX Runtime WASM build artifacts"
          WASM_FILE="packages/onnxruntime-builder/build/wasm/ort-wasm-simd-threaded.wasm"
          MJS_FILE="packages/onnxruntime-builder/build/wasm/ort-wasm-simd-threaded.mjs"

          if [ -f "$WASM_FILE" ]; then
            SIZE=$(du -h "$WASM_FILE" | cut -f1)
            echo "✓ WASM file: $SIZE"
            file "$WASM_FILE"
          else
            echo "✗ WASM file not found: $WASM_FILE"
            exit 1
          fi

          if [ -f "$MJS_FILE" ]; then
            SIZE=$(du -h "$MJS_FILE" | cut -f1)
            echo "✓ MJS file: $SIZE"
          else
            echo "✗ MJS file not found: $MJS_FILE"
            exit 1
          fi

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-wasm
          path: |
            packages/onnxruntime-builder/build/wasm/ort-wasm-simd-threaded.wasm
            packages/onnxruntime-builder/build/wasm/ort-wasm-simd-threaded.mjs
          retention-days: 30
          if-no-files-found: error
