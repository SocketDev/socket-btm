name: 🔄 Update Release Checksums

on:
  workflow_call:
    secrets:
      BOT_GPG_PRIVATE_KEY:
        required: false
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # MUST be a static global group. When this workflow is invoked via
  # workflow_call, github.workflow evaluates to the CALLER's workflow
  # name, so parallel release publishes (curl + lief + node-smol finishing
  # at the same time) would each land in a DIFFERENT concurrency group
  # and all try to `git pull --rebase && git push origin main` against
  # release-assets.json simultaneously — rebase is not atomic across
  # concurrent runners and one push is guaranteed to lose its commit.
  # A static group (repo-scoped) serializes every update-checksums run.
  group: update-checksums-${{ github.repository }}-main
  cancel-in-progress: false

jobs:
  update-checksums:
    name: release-assets.json
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Require an approval gate when invoked directly via workflow_dispatch.
    # Without this an actor with workflow-dispatch permission could push
    # to main — the job elevates `contents: write` and commits release-
    # assets.json. Every caller that invokes this via workflow_call is
    # already under `environment: release`; enforcing it here too makes
    # the guarantee uniform.
    environment: release
    permissions:
      contents: write # Required to commit updated release-assets.json
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@5c06f15d39c5538513a9b7842ddb07d1b042f5d3 # main (2026-05-15)
      - uses: SocketDev/socket-registry/.github/actions/setup-git-signing@75964f14e0682ae4aa846119e2fc9a710d970056 # main (2026-05-15)
        with:
          gpg-private-key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}

      - name: Update checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm --filter build-infra update-checksums

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet packages/build-infra/release-assets.json; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No checksum changes"
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Checksums updated"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has-changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Pass the authed URL directly to `git push` instead of writing
          # it into .git/config via `remote set-url origin`. The old form
          # left the x-access-token URL persisted in the workspace config
          # for the rest of the job, so any subsequent step that logged
          # `git remote -v` (or a tool that did) would leak the token to
          # workflow logs. One-shot URLs never touch .git/config.
          git add packages/build-infra/release-assets.json
          git commit -m "chore: update release checksums"

          # Retry-on-race: even with the workflow-level concurrency
          # group serializing update-checksums, a parallel push from a
          # human (or another workflow that bumps unrelated files,
          # e.g. cascade-tooling) can land between our `pull --rebase`
          # and `push`, causing a non-fast-forward rejection. Retry
          # the rebase+push up to N times with a brief backoff before
          # giving up. The change is idempotent (we only commit the
          # new release-assets.json), so re-rebasing is safe.
          PUSH_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          MAX_ATTEMPTS=5
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            git pull --rebase origin main
            if git push "$PUSH_URL" HEAD:main 2>&1 | tee /tmp/push-output.log; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            # Only retry on non-fast-forward (the race we care about).
            # Other errors (auth, network) won't recover via retry.
            if ! grep -q "rejected.*fetch first\|non-fast-forward" /tmp/push-output.log; then
              echo "Push failed for non-race reason; not retrying"
              exit 1
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              # Linear backoff: 2s, 4s, 6s, 8s. Total worst-case
              # window of 20s before giving up — still well under
              # the 10-minute job timeout, leaves plenty of headroom
              # for the actual rebase work each iteration.
              sleep $((attempt * 2))
              echo "Race detected; rebasing and retrying ($((attempt + 1))/$MAX_ATTEMPTS)"
            fi
          done
          echo "Push failed after $MAX_ATTEMPTS attempts; main is still moving"
          exit 1

      - uses: SocketDev/socket-registry/.github/actions/cleanup-git-signing@75964f14e0682ae4aa846119e2fc9a710d970056 # main (2026-05-15)
        if: always()
