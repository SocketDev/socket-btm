[package]
name = "iocraft-node"
version = "0.1.0"
edition = "2021"
description = "Node.js bindings for iocraft TUI library"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
# napi-rs for Node.js bindings
napi = { version = "3", default-features = false, features = ["napi9", "tokio_rt", "serde-json"] }
napi-derive = "3"

# iocraft TUI framework
iocraft = { path = "upstream/iocraft/packages/iocraft" }

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }

# Serialization for component trees
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Terminal handling
crossterm = "0.28"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
opt-level = 3
strip = true
