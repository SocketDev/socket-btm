<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">How a Socket binary is built</title>
  <desc id="desc">binject merges a Node.js runtime with your app's source files into a Single Executable Application. Solid borders are real files on disk; dashed borders are virtual files embedded inside the binary.</desc>

  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="purple-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="pink-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EC4899" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0.03"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C2509E"/>
    </marker>
  </defs>

  <rect width="900" height="540" fill="#ffffff"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1f1235">How a Socket binary is built</text>
  <text x="450" y="64" text-anchor="middle" font-size="13" fill="#6b6480">binject merges the Node.js runtime with your app's files into one Single Executable Application.</text>

  <!-- LEFT: INPUTS -->
  <text x="155" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5">INPUTS · ON DISK</text>

  <rect x="55" y="115" width="200" height="80" rx="8" fill="url(#purple-fade)" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="155" y="143" text-anchor="middle" font-size="14" font-weight="600" fill="#1f1235">Node.js binary</text>
  <text x="155" y="163" text-anchor="middle" font-size="12" fill="#6b6480">raw, no app yet</text>
  <text x="155" y="180" text-anchor="middle" font-size="11" fill="#8B5CF6">from node-smol-builder</text>

  <text x="155" y="225" text-anchor="middle" font-size="22" font-weight="700" fill="#8B5CF6">+</text>

  <rect x="55" y="240" width="200" height="200" rx="8" fill="url(#purple-fade)" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="155" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#1f1235">your app + files</text>

  <rect x="75" y="278" width="160" height="28" rx="4" fill="#ffffff" stroke="#8B5CF6" stroke-width="1"/>
  <text x="155" y="297" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">index.js</text>

  <rect x="75" y="310" width="160" height="28" rx="4" fill="#ffffff" stroke="#8B5CF6" stroke-width="1"/>
  <text x="155" y="329" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">sea-config.json</text>

  <rect x="75" y="342" width="160" height="28" rx="4" fill="#ffffff" stroke="#8B5CF6" stroke-width="1"/>
  <text x="155" y="361" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">node_modules/</text>

  <rect x="75" y="374" width="160" height="28" rx="4" fill="#ffffff" stroke="#8B5CF6" stroke-width="1"/>
  <text x="155" y="393" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">assets/icon.png</text>

  <text x="155" y="425" text-anchor="middle" font-size="11" font-style="italic" fill="#6b6480">…and any other files</text>

  <!-- MIDDLE: BINJECT ACTION -->
  <path d="M 270 280 L 425 280" fill="none" stroke="url(#brand)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="347" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#C2509E">binject</text>
  <text x="347" y="298" text-anchor="middle" font-size="11" fill="#6b6480">compiles entry → SEA blob</text>
  <text x="347" y="313" text-anchor="middle" font-size="11" fill="#6b6480">tars files → VFS section</text>
  <text x="347" y="328" text-anchor="middle" font-size="11" fill="#6b6480">injects both into the binary</text>

  <!-- RIGHT: OUTPUT (the SEA) -->
  <text x="635" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#EC4899" letter-spacing="1.5">OUTPUT · ONE BINARY</text>

  <rect x="440" y="115" width="390" height="380" rx="14" fill="url(#pink-fade)" stroke="#EC4899" stroke-width="2"/>
  <text x="635" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#1f1235">Single Executable Application (SEA)</text>

  <!-- Region: Runtime -->
  <rect x="455" y="160" width="360" height="58" rx="6" fill="#ffffff" stroke="#EC4899" stroke-width="1.5"/>
  <text x="635" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#1f1235">Node.js runtime</text>
  <text x="635" y="204" text-anchor="middle" font-size="11" fill="#6b6480">v26 + Socket patches · node:smol-* built-ins</text>

  <!-- Region: SEA blob -->
  <text x="455" y="244" font-size="11" font-weight="700" fill="#BA478B" letter-spacing="1">SEA BLOB · executed on startup</text>
  <rect x="465" y="254" width="160" height="36" rx="4" fill="#ffffff" stroke="#BA478B" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="545" y="277" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">index.js (bytecode)</text>
  <rect x="635" y="254" width="170" height="36" rx="4" fill="#ffffff" stroke="#BA478B" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="720" y="277" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">sea-config.json</text>

  <!-- Region: VFS -->
  <text x="455" y="324" font-size="11" font-weight="700" fill="#EC4899" letter-spacing="1">VFS SECTION · read via fs.readFile()</text>
  <rect x="465" y="334" width="115" height="32" rx="4" fill="#ffffff" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="523" y="354" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">package.json</text>
  <rect x="588" y="334" width="115" height="32" rx="4" fill="#ffffff" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="646" y="354" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">node_modules/</text>
  <rect x="711" y="334" width="105" height="32" rx="4" fill="#ffffff" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="763" y="354" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">assets/</text>

  <rect x="465" y="374" width="115" height="32" rx="4" fill="#ffffff" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="523" y="394" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">lib/util.js</text>
  <rect x="588" y="374" width="115" height="32" rx="4" fill="#ffffff" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="646" y="394" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">templates/</text>
  <rect x="711" y="374" width="105" height="32" rx="4" fill="#ffffff" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="763" y="394" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#1f1235">…</text>

  <text x="635" y="438" text-anchor="middle" font-size="11" font-style="italic" fill="#6b6480">these look like real files to your code · fs.readFile('package.json') just works</text>
  <text x="635" y="476" text-anchor="middle" font-size="11" fill="#6b6480">stored as a tar.gz · ungzipped lazily by node:smol-vfs</text>

  <!-- Legend -->
  <text x="450" y="515" text-anchor="middle" font-size="11" fill="#6b6480">Legend: solid borders = real files on disk · dashed borders = virtual files embedded inside the binary.</text>
</svg>
