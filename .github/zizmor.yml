# Zizmor configuration
# See: https://docs.zizmor.sh/configuration/

rules:
  cache-poisoning:
    ignore:
      # False positive: We explicitly disabled caching with cache: ''
      # Line 48: checks job - Setup Node.js step
      - ci.yml:48
      # False positive: We explicitly disabled caching with cache: ''
      # Line 114: test job - Setup Node.js step
      - ci.yml:114
      # False positive: We explicitly disabled caching with cache: ''
      # Line 215: stubs workflow - Setup Node.js step
      - stubs.yml:215

  secrets-outside-env:
    disable: true

  template-injection:
    ignore:
      # False positive: Template expansion is in a comment, not executable code
      # Line 469: Comment explaining GitHub Actions syntax
      - node-smol.yml:469
