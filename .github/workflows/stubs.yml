name: SMOL 3. Stubs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no release)'
        type: boolean
        default: true
      force:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false
      debug:
        description: 'Debug (0|1|namespace[,...])'
        required: false
        default: '0'
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-stubs:
    permissions:
      # actions/upload-artifact does NOT need contents: write — it writes
      # to the artifact store via the default token's artifact scope. Keep
      # contents: read for least-privilege; the release job elevates to
      # write when it actually creates a GitHub Release.
      contents: read
      id-token: write # OIDC authentication for Depot builds
    name: stub / ${{ matrix.platform == 'win32' && 'win' || matrix.platform }}-${{ matrix.arch }}${{ matrix.libc == 'musl' && '-musl' || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds (native and cross-compile).
          # Use Depot runner for darwin: 8 vCPU M2, 24GB RAM.
          # Cross-compile x64 from ARM64 since Depot only offers ARM64 macOS.
          - runner: depot-macos-15
            platform: darwin
            arch: arm64
            os: macos
            makefile: Makefile.macos
          - runner: depot-macos-15
            platform: darwin
            arch: x64
            os: macos
            makefile: Makefile.macos
            cross_compile: true

          # Linux glibc builds.
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            os: linux
            libc: glibc
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            os: linux
            libc: glibc

          # Linux musl builds.
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            os: linux
            libc: musl
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            os: linux
            libc: musl

          # Windows builds.
          - runner: windows-2022
            platform: win32
            arch: x64
            os: windows
            makefile: Makefile.win
          - runner: windows-2022
            platform: win32
            arch: arm64
            os: windows
            makefile: Makefile.win
            cross_compile: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Don't clone all submodules - only needed ones are initialized below.
          submodules: false

      - name: Load stubs cache version from centralized config
        id: stubs-cache-version
        uses: ./.github/actions/load-cache-version
        with:
          package-name: stubs

      - name: Load curl cache version from centralized config
        id: curl-cache-version
        uses: ./.github/actions/load-cache-version
        with:
          package-name: curl

      - name: Load lief cache version from centralized config
        id: lief-cache-version
        uses: ./.github/actions/load-cache-version
        with:
          package-name: lief

      - name: Compose combined cache version with submodule SHAs + source hash
        id: cache-version
        shell: bash
        env:
          STUBS_VERSION: ${{ steps.stubs-cache-version.outputs.version }}
          CURL_VERSION: ${{ steps.curl-cache-version.outputs.version }}
          LIEF_VERSION: ${{ steps.lief-cache-version.outputs.version }}
        run: |
          # Get curl and mbedtls submodule SHAs from git tree (works without submodule init).
          CURL_SHA=$(git ls-tree HEAD packages/curl-builder/upstream/curl 2>/dev/null | awk '{print $3}' || echo "none")
          MBEDTLS_SHA=$(git ls-tree HEAD packages/curl-builder/upstream/mbedtls 2>/dev/null | awk '{print $3}' || echo "none")

          # Compute curl cache key (same formula as curl.yml).
          CURL_CACHE_KEY="${CURL_VERSION}-${CURL_SHA:0:7}-${MBEDTLS_SHA:0:7}"

          # Detect hash command (prefer sha256sum, fall back to shasum).
          if command -v sha256sum &> /dev/null; then
            hash_cmd="sha256sum"
          elif command -v shasum &> /dev/null; then
            hash_cmd="shasum -a 256"
          else
            echo "× Error: No SHA-256 command found"
            exit 1
          fi

          # Helper function to hash files. sort -u dedupes so overlapping
          # paths (parent + child passed to the same call) don't double-
          # hash shared files — matches node-smol.yml's helper exactly.
          hash_files() {
            # Verify at least one positional argument (before any -type / -name
            # flags) refers to an existing path. Previously a renamed/deleted
            # directory silently produced an empty hash, which kept the cache
            # key stable across genuine content changes. Fail loudly instead.
            local any_exists=0
            for arg in "$@"; do
              case "$arg" in
                -*) break ;;
              esac
              if [ -e "$arg" ]; then
                any_exists=1
                break
              fi
            done
            if [ "$any_exists" -eq 0 ]; then
              echo "× hash_files: no input path exists (got: $*)" >&2
              exit 1
            fi
            # LC_COLLATE=C pins sort to byte-order so cache keys stay
            # locale-independent across runner images.
            local files=$(find "$@" 2>/dev/null | LC_COLLATE=C sort -u)
            if [ -n "$files" ]; then
              echo "$files" | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1
            else
              echo ""
            fi
          }

          # Hash canonical source packages (source of truth for stubs).
          BUILD_INFRA_SRC=$(hash_files packages/build-infra/src/socketsecurity/build-infra -type f)
          BIN_INFRA_SRC=$(hash_files packages/bin-infra/src/socketsecurity/bin-infra -type f)
          # TypeScript helpers used by the build scripts. Previously
          # missed — edits to e.g. build-infra/lib/checkpoint-manager.mts
          # silently hit stale cache.
          BUILD_INFRA_LIB=$(hash_files packages/build-infra/lib -type f)
          BIN_INFRA_LIB=$(hash_files packages/bin-infra/lib -type f)
          # Shared .mk files — stubs Makefiles `include` common.mk,
          # platform-*.mk, crypto.mk, zstd.mk. An edit there changes
          # CFLAGS / link rules and must bust the cache.
          BUILD_INFRA_MAKE=$(hash_files packages/build-infra/make -type f)
          BIN_INFRA_MAKE=$(hash_files packages/bin-infra/make -type f)
          STUBS_MAKE=$(hash_files packages/stubs-builder/make -type f)
          # Foundational toolchain pins + cross-package build scripts.
          # external-tools.json is ALL_DOWNSTREAM per CASCADE_RULES —
          # a bump there must invalidate every builder's cache.
          # build-infra/scripts/ holds get-checkpoint-chain and
          # smoke-test-binary which orchestrate the build. Both were
          # hashed elsewhere but missing here — defense-in-depth gap.
          BUILD_INFRA_EXTERNAL_TOOLS=$($hash_cmd packages/build-infra/external-tools.json 2>/dev/null | cut -d' ' -f1)
          BUILD_INFRA_SCRIPTS=$(hash_files packages/build-infra/scripts -type f)
          # pnpm-lock.yaml: Docker builds and host-side `node` commands
          # resolve workspace deps at runtime; a lock bump can alter
          # build behavior. Hash so the cache invalidates when deps change.
          PNPM_LOCK_HASH=$($hash_cmd pnpm-lock.yaml 2>/dev/null | cut -d' ' -f1)
          STUBS_SRC=$(hash_files packages/stubs-builder/src -type f)
          # Scripts orchestrate the build (packaging layout, final layout,
          # checkpoint-chain). Edits MUST bust the cache.
          STUBS_SCRIPTS=$(hash_files packages/stubs-builder/scripts -type f)
          # Makefiles drive macOS / Windows compilation directly. Changes
          # to CFLAGS / LDFLAGS / target names must invalidate artifacts.
          STUBS_MAKEFILES=$(hash_files packages/stubs-builder/Makefile.linux packages/stubs-builder/Makefile.macos packages/stubs-builder/Makefile.win -type f)
          # Linux stub builds consume Dockerfile.glibc / Dockerfile.musl via
          # Depot.dev. An edit there (base image pin, toolchain) MUST bust
          # the cache — otherwise a stale tarball is served on cache hit.
          STUBS_DOCKERFILES=$(hash_files packages/stubs-builder/docker -type f)
          # zstd submodule SHA: stubs link against zstd for decompression.
          # `git submodule update --remote` that advances zstd without
          # touching .gitmodules would otherwise leave the key unchanged
          # and serve stale stubs linked against the old zstd.
          ZSTD_SHA=$(git ls-tree HEAD packages/bin-infra/upstream/zstd 2>/dev/null | awk '{print $3}' || echo "none")
          # LIEF hashing: stubs Dockerfiles COPY packages/lief-builder/make
          # + upstream and link LIEF into the produced stub binaries.
          # Before R27 stubs had zero LIEF cache-key integration — an
          # edit to lief.mk (LIEF_CFLAGS / LIEF_DEFINES) or a LIEF
          # submodule bump shipped new stubs against the old cache.
          LIEF_MAKE=$(hash_files packages/lief-builder/make -type f)
          LIEF_UPSTREAM_SHA=$(git ls-tree HEAD packages/lief-builder/upstream/lief 2>/dev/null | awk '{print $3}' || echo "none")
          # .github/scripts/ Docker bootstrappers (build-static-openssl.sh
          # hard-codes OPENSSL_VERSION; ensure-zstd.sh fetches zstd if
          # the submodule is absent). RUN'd from stubs-builder Dockerfiles.
          GITHUB_SCRIPTS=$(hash_files .github/scripts -type f)
          # stubs Dockerfiles COPY root package.json + pnpm-workspace.yaml
          # (catalog versions / overrides / trustPolicy / minimumReleaseAge).
          # Edits there change what `pnpm install` resolves inside the
          # Docker build. Unhashed before R24.
          ROOT_PACKAGE_JSON=$($hash_cmd package.json 2>/dev/null | cut -d' ' -f1)
          PNPM_WORKSPACE=$($hash_cmd pnpm-workspace.yaml 2>/dev/null | cut -d' ' -f1)
          # Per-package package.json defense-in-depth: holds devDeps
          # and (future) source pins specific to stubs. Captured by the
          # pnpm-lock hash today but hashing directly keeps the key
          # uniform with iocraft/ink/onnxruntime/yoga-layout workflows.
          STUBS_PACKAGE_JSON=$($hash_cmd packages/stubs-builder/package.json 2>/dev/null | cut -d' ' -f1)
          # Socket-registry propagation SHA — extracted from THIS
          # workflow's own YAML at runtime, not via a catalog lookup.
          # A registry cascade bump (which edits the @<sha> pin in
          # this file) flows through to a cache-key change here, so
          # the checkpoint cache invalidates whenever the registry
          # provisions a new pnpm version / zizmor build / etc. That
          # makes .build-context/registry-tools.json — whose contents
          # are materialized per-run from SOCKET_TOOL_CHECKSUMS_FILE
          # — implicitly part of the cache key.
          WORKFLOW_FILE="${GITHUB_WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE#${GITHUB_REPOSITORY}/}"
          SOCKET_REGISTRY_SHA=$(grep -ohE 'SocketDev/socket-registry/[^@]+@[0-9a-f]{40}' "$WORKFLOW_FILE" 2>/dev/null | head -1 | grep -oE '[0-9a-f]{40}$' || echo "")

          # Stubs cache key = stubs version + curl cache key + lief
          # cache key + source hashes.
          LIEF_CACHE_KEY="${LIEF_VERSION}-${LIEF_UPSTREAM_SHA:0:7}"
          FINAL_HASH=$(echo "${BUILD_INFRA_SRC}${BIN_INFRA_SRC}${BUILD_INFRA_LIB}${BIN_INFRA_LIB}${BUILD_INFRA_MAKE}${BIN_INFRA_MAKE}${BUILD_INFRA_EXTERNAL_TOOLS}${BUILD_INFRA_SCRIPTS}${STUBS_SRC}${STUBS_SCRIPTS}${STUBS_MAKEFILES}${STUBS_MAKE}${STUBS_DOCKERFILES}${LIEF_MAKE}${GITHUB_SCRIPTS}${ZSTD_SHA}${LIEF_UPSTREAM_SHA}${PNPM_LOCK_HASH}${ROOT_PACKAGE_JSON}${PNPM_WORKSPACE}${STUBS_PACKAGE_JSON}${SOCKET_REGISTRY_SHA}" | $hash_cmd | cut -d' ' -f1)
          # Take 16 hex chars (64 bits) of FINAL_HASH, not 7 (28 bits).
          # 28 bits hits 50% birthday-collision probability around 16k
          # distinct hash inputs — well within CI cache lifetime across
          # PRs/pushes/rebuilds. 64 bits pushes that threshold past 4e9
          # inputs, so cache keys effectively can't collide.
          FINAL_HASH_SHORT="${FINAL_HASH:0:16}"
          COMBINED_VERSION="${STUBS_VERSION}-curl-${CURL_CACHE_KEY}-lief-${LIEF_CACHE_KEY}-src-${FINAL_HASH_SHORT}"
          echo "version=$COMBINED_VERSION" >> "$GITHUB_OUTPUT"
          echo "stubs_version=$STUBS_VERSION" >> "$GITHUB_OUTPUT"
          echo "curl_cache_key=$CURL_CACHE_KEY" >> "$GITHUB_OUTPUT"
          echo "lief_cache_key=$LIEF_CACHE_KEY" >> "$GITHUB_OUTPUT"
          echo "final_hash_short=$FINAL_HASH_SHORT" >> "$GITHUB_OUTPUT"
          echo "Cache version: $COMBINED_VERSION"
          echo "  stubs: $STUBS_VERSION"
          echo "  curl cache key: $CURL_CACHE_KEY"
          echo "  lief cache key: $LIEF_CACHE_KEY"
          echo "  source hash: $FINAL_HASH_SHORT"

      - name: Set platform-arch
        id: platform-arch
        uses: ./.github/actions/set-platform-arch
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          libc: ${{ matrix.libc }}

      - name: Restore stubs checkpoint cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: stubs-checkpoint-cache
        if: ${{ !inputs.force }}
        with:
          # Cache both Linux (Depot export to out/) and native (build/prod/<platform-arch>/out/Final) outputs.
          path: |
            packages/stubs-builder/out
            packages/stubs-builder/build/prod/${{ steps.platform-arch.outputs.platform_arch }}/out/Final
          key: stubs-${{ steps.cache-version.outputs.version }}-${{ steps.platform-arch.outputs.platform_arch }}

      # Skip the zstd submodule fetch when the cache hits — the final stub
      # is already tarballed. The cache key above already bakes in the zstd
      # submodule SHA via `git ls-tree HEAD` (no init needed to compute it).
      - name: Initialize submodules
        if: steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force
        uses: ./.github/actions/init-submodules
        with:
          submodules: packages/bin-infra/upstream/zstd

      - name: Setup Depot CLI
        if: matrix.os == 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1
        with:
          oidc: true

      - uses: SocketDev/socket-registry/.github/actions/setup@024156f860be6d0e0e060360fa90747b8b6fbcf3 # main
        if: matrix.os == 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)

      - name: Stage registry tool-checksums for Docker build context
        if: matrix.os == 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        shell: bash
        run: |
          # Socket-registry's setup action exports SOCKET_TOOL_CHECKSUMS_FILE
          # pointing at a stable on-runner copy of external-tools.json.
          # Dockerfiles `COPY .build-context/registry-tools.json …` to
          # resolve pnpm version + per-platform asset + sha256 at build
          # time without duplicating per-Dockerfile constants.
          mkdir -p .build-context
          cp "$SOCKET_TOOL_CHECKSUMS_FILE" .build-context/registry-tools.json

      - name: Build stubs with Depot (Linux - offloads compute)
        if: matrix.os == 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # v1.17.0
        with:
          project: 8fpj9495vw
          platforms: linux/${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}
          build-args: |
            BUILD_MODE=prod
            PLATFORM_ARCH=${{ steps.platform-arch.outputs.platform_arch }}
            CACHE_VERSION=${{ steps.cache-version.outputs.version }}
            CURL_CACHE_VERSION=${{ steps.cache-version.outputs.curl_cache_key }}
          no-cache: ${{ inputs.force == true }}
          file: packages/stubs-builder/docker/Dockerfile.${{ matrix.libc || 'glibc' }}
          target: export
          outputs: type=local,dest=packages/stubs-builder/out
          context: .

      - name: Verify Depot build output (Linux)
        if: matrix.os == 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        shell: bash
        run: |
          echo "Verifying Depot build output structure..."
          ls -lah packages/stubs-builder/out/ || echo "Output directory not found"

          # Check for stub binary.
          if [ -f "packages/stubs-builder/out/smol_stub" ]; then
            echo "✅ smol_stub found"
            file packages/stubs-builder/out/smol_stub || true
          else
            echo "× smol_stub not found!"
            echo "Contents of output directory:"
            find packages/stubs-builder/ -type f 2>/dev/null || echo "No files found"
            exit 1
          fi

      - uses: SocketDev/socket-registry/.github/actions/setup@024156f860be6d0e0e060360fa90747b8b6fbcf3 # main
        if: matrix.os != 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)

      - uses: SocketDev/socket-registry/.github/actions/install@024156f860be6d0e0e060360fa90747b8b6fbcf3 # main
        if: matrix.os != 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)

      - name: Setup build environment (macOS)
        if: matrix.os == 'macos' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        shell: bash
        run: |
          # macOS already has Xcode command line tools.
          echo "Build environment ready"

      - name: Setup build environment (Windows x64)
        if: matrix.os == 'windows' && matrix.arch == 'x64' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        shell: bash
        run: |
          # Install MinGW for Windows x64 builds.
          choco install mingw -y
          # Add MinGW to PATH.
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

      - name: Install llvm-mingw (Windows ARM64 cross-compile)
        if: matrix.os == 'windows' && matrix.arch == 'arm64' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        uses: ./.github/actions/install-llvm-mingw

      - name: Build stub (macOS/Windows)
        if: matrix.os != 'linux' && (steps.stubs-checkpoint-cache.outputs.cache-hit != 'true' || inputs.force)
        shell: bash
        working-directory: packages/stubs-builder
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          CROSS_COMPILE: ${{ matrix.cross_compile && '1' || '0' }}
          DEBUG: ${{ inputs.debug != '0' && inputs.debug || '' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Build script handles curl dependency download and stub compilation.
          node scripts/build.mts

      # Hoist canonical stub paths into step outputs so the verify and
      # artifact steps share one source of truth. Binary location differs
      # between Docker (Linux export → out/) and native (macOS/Windows →
      # build/prod/<platformArch>/out/Final). The native path mirrors
      # build-infra/lib/paths.mts:getFinalBinaryPath() for stubs-builder
      # — keep both byte-aligned.
      - name: Compute stub paths
        id: stub-paths
        shell: bash
        env:
          BUILD_MODE: prod
          PLATFORM_ARCH: ${{ steps.platform-arch.outputs.platform_arch }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          if [ "$MATRIX_OS" = "linux" ]; then
            FINAL_DIR_REL="out"
          else
            FINAL_DIR_REL="build/${BUILD_MODE}/${PLATFORM_ARCH}/out/Final"
          fi
          if [ "$MATRIX_OS" = "windows" ]; then
            STUB_FILE_NAME="smol_stub.exe"
          else
            STUB_FILE_NAME="smol_stub"
          fi
          {
            echo "final_dir_rel=${FINAL_DIR_REL}"
            echo "final_dir=packages/stubs-builder/${FINAL_DIR_REL}"
            echo "stub_file_name=${STUB_FILE_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify stub binary
        shell: bash
        working-directory: packages/stubs-builder
        env:
          STUB_FILE: ${{ steps.stub-paths.outputs.final_dir_rel }}/${{ steps.stub-paths.outputs.stub_file_name }}
        run: |
          if [ ! -f "$STUB_FILE" ]; then
            echo "Error: Stub binary not found: $STUB_FILE"
            exit 1
          fi

          # Show file info.
          ls -lh "$STUB_FILE"
          file "$STUB_FILE" || true

          # Check size is reasonable (< 100KB).
          SIZE=$(stat -c%s "$STUB_FILE" 2>/dev/null || stat -f%z "$STUB_FILE" 2>/dev/null || echo "0")
          if [ "$SIZE" -gt 102400 ]; then
            echo "Warning: Stub is larger than expected: ${SIZE} bytes"
          fi
          echo "Stub size: ${SIZE} bytes"

      - name: Create release artifact
        shell: bash
        env:
          STUB_DIR: ${{ steps.stub-paths.outputs.final_dir }}
          STUB_FILE: ${{ steps.stub-paths.outputs.stub_file_name }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_LIBC: ${{ matrix.libc }}
        run: |
          PLATFORM="$MATRIX_PLATFORM"
          ARCH="$MATRIX_ARCH"
          LIBC="$MATRIX_LIBC"

          # Transform win32 → win for consistency with other tools.
          if [ "$PLATFORM" = "win32" ]; then
            PLATFORM="win"
          fi

          # Construct artifact name (all hyphens, following lief convention).
          ARTIFACT_NAME="smol-stub-${PLATFORM}-${ARCH}"
          if [ "${LIBC}" = "musl" ]; then
            ARTIFACT_NAME="${ARTIFACT_NAME}-musl"
          fi

          # Create tarball (preserving just the binary name).
          OUTPUT_DIR="packages/stubs-builder"
          tar -czf "${OUTPUT_DIR}/${ARTIFACT_NAME}.tar.gz" -C "${STUB_DIR}" "$STUB_FILE"

          echo "Created artifact: ${ARTIFACT_NAME}.tar.gz"
          ls -lh "${OUTPUT_DIR}/${ARTIFACT_NAME}.tar.gz"

          # Export the name for downstream upload-artifact step.
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: packages/stubs-builder/${{ env.ARTIFACT_NAME }}.tar.gz
          retention-days: 30
          if-no-files-found: error
          # tar.gz payload is already gzipped — skip re-gzip.
          compression-level: 0

  release:
    name: Release stubs
    needs: build-stubs
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    environment: release
    permissions:
      contents: write # Required to create GitHub releases
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/scripts/generate-version.sh
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts
          pattern: smol-stub-*
          merge-multiple: true

      - name: Verify downloaded artifacts
        shell: bash
        run: |
          echo "Checking for downloaded artifacts..."
          if [ -d "artifacts" ]; then
            echo "✅ Artifacts directory exists"
            echo "Contents:"
            ls -lah artifacts/
            if [ -n "$(ls -A artifacts/*.tar.gz 2>/dev/null)" ]; then
              echo "✅ Found $(ls artifacts/*.tar.gz 2>/dev/null | wc -l) tar.gz files"
            else
              echo "× No tar.gz files found in artifacts directory"
              exit 1
            fi
          else
            echo "× Artifacts directory does not exist"
            echo "This means no artifacts were uploaded by the build jobs."
            exit 1
          fi

      - name: Generate release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          source .github/scripts/generate-version.sh
          TAG="stubs-${VERSION}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          # Move artifacts to release directory.
          mkdir -p release
          for file in artifacts/*.tar.gz; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              mv "$file" "release/$filename"
              echo "Added to release: $filename"
            fi
          done

          # Verify we have artifacts to release.
          if [ -z "$(ls -A release/*.tar.gz 2>/dev/null)" ]; then
            echo "Error: No .tar.gz files found in release directory after moving from artifacts"
            exit 1
          fi

          echo "Found $(ls release/*.tar.gz | wc -l) archives to release"

          # Generate checksums.
          cd release
          if command -v shasum &> /dev/null; then
            shasum -a 256 *.tar.gz > checksums.txt
          elif command -v sha256sum &> /dev/null; then
            sha256sum *.tar.gz > checksums.txt
          else
            echo "Error: No SHA-256 command found"
            exit 1
          fi
          cat checksums.txt
          cd ..

          # Create release.
          TITLE_SUFFIX="${RELEASE_TAG#stubs-}"
          gh release create "${RELEASE_TAG}" \
            --title "stubs ${TITLE_SUFFIX}" \
            --notes "SMOL decompression stub binaries for all platforms.

          ## Platforms
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64
          - linux-arm64-musl
          - linux-x64-musl
          - win-arm64
          - win-x64

          ## Files
          Each platform archive contains a small stub binary used by \`binpress\` to create self-extracting executables.
          - \`checksums.txt\` - SHA256 checksums

          ## Usage
          Download the appropriate stub for your platform and extract:
          \`\`\`bash
          tar -xzf smol-stub-<platform>-<arch>[-<libc>].tar.gz
          \`\`\`" \
            release/*.tar.gz \
            release/checksums.txt

  update-checksums:
    needs: release
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    permissions:
      contents: write # release-assets.json commit after publishing GitHub release
    uses: ./.github/workflows/update-checksums.yml
    secrets:
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
