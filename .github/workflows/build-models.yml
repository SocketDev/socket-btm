name: Build AI Models

on:
  push:
    branches:
      - main
    paths:
      - 'packages/models/**'
      - 'packages/minilm-builder/**'
      - 'packages/codet5-models-builder/**'
      - '.github/workflows/build-models.yml'
  pull_request:
    paths:
      - 'packages/models/**'
      - 'packages/minilm-builder/**'
      - 'packages/codet5-models-builder/**'
      - '.github/workflows/build-models.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        type: boolean
        default: false
      quant_level:
        description: 'Quantization level (int8, int4, or both)'
        required: false
        type: choice
        options:
          - both
          - int8
          - int4
        default: both
  workflow_call:
    inputs:
      force:
        description: 'Force rebuild (ignore cache)'
        required: false
        type: boolean
        default: false
      quant_level:
        description: 'Quantization level (int8, int4, or both)'
        required: false
        type: string
        default: both

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.20.0'
  USE_CACHE: ${{ vars.USE_CACHE != 'false' }}

permissions:
  contents: read

concurrency:
  group: build-models-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-models:
    name: Build Models (${{ matrix.quant_level }})
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      matrix:
        quant_level: ${{
          (inputs.quant_level == 'both' || inputs.quant_level == '' || inputs.quant_level == null) && fromJSON('["int8", "int4"]') ||
          fromJSON(format('["{0}"]', inputs.quant_level))
        }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate cache key
        id: cache-key
        shell: bash
        run: |
          # Generate content-based hash from source and scripts
          HASH=$(find packages/models/scripts packages/minilm-builder packages/codet5-models-builder -type f \( -name "*.mjs" -o -name "*.json" \) 2>/dev/null | sort | xargs shasum -a 256 2>/dev/null | shasum -a 256 | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Cache key hash: $HASH"

      - name: Restore models source cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: source-cache
        uses: actions/cache@v4
        with:
          path: packages/models/build/models
          key: models-source-${{ steps.cache-key.outputs.hash }}
          restore-keys: models-source-

      - name: Restore models build cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: models-cache
        uses: actions/cache@v4
        with:
          path: packages/models/build/${{ matrix.quant_level }}
          key: models-${{ matrix.quant_level }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: models-${{ matrix.quant_level }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore checkpoints cache
        if: inputs.force != true && env.USE_CACHE == 'true'
        id: checkpoints-cache
        uses: actions/cache@v4
        with:
          path: packages/models/build/checkpoints
          key: models-checkpoints-${{ matrix.quant_level }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: models-checkpoints-${{ matrix.quant_level }}-${{ runner.os }}-${{ runner.arch }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install transformers torch onnx onnxruntime

      - name: Build models
        run: pnpm --filter models build --${{ matrix.quant_level }}

      - name: Verify model artifacts
        shell: bash
        run: |
          echo "Verifying model build artifacts (${{ matrix.quant_level }})"
          DIST_DIR="packages/models/dist"
          QUANT="${{ matrix.quant_level }}"

          # Check MiniLM model
          MINILM_FILE="${DIST_DIR}/minilm-l6-${QUANT}.onnx"
          MINILM_TOKENIZER="${DIST_DIR}/minilm-l6-tokenizer.json"

          if [ -f "$MINILM_FILE" ]; then
            SIZE=$(du -h "$MINILM_FILE" | cut -f1)
            echo "✓ MiniLM model: $SIZE"
          else
            echo "✗ MiniLM model not found: $MINILM_FILE"
            exit 1
          fi

          if [ -f "$MINILM_TOKENIZER" ]; then
            SIZE=$(du -h "$MINILM_TOKENIZER" | cut -f1)
            echo "✓ MiniLM tokenizer: $SIZE"
          else
            echo "✗ MiniLM tokenizer not found: $MINILM_TOKENIZER"
            exit 1
          fi

          # Check CodeT5 models
          CODET5_ENCODER="${DIST_DIR}/codet5-encoder-${QUANT}.onnx"
          CODET5_DECODER="${DIST_DIR}/codet5-decoder-${QUANT}.onnx"
          CODET5_TOKENIZER="${DIST_DIR}/codet5-tokenizer.json"

          if [ -f "$CODET5_ENCODER" ]; then
            SIZE=$(du -h "$CODET5_ENCODER" | cut -f1)
            echo "✓ CodeT5 encoder: $SIZE"
          else
            echo "✗ CodeT5 encoder not found: $CODET5_ENCODER"
            exit 1
          fi

          if [ -f "$CODET5_DECODER" ]; then
            SIZE=$(du -h "$CODET5_DECODER" | cut -f1)
            echo "✓ CodeT5 decoder: $SIZE"
          else
            echo "✗ CodeT5 decoder not found: $CODET5_DECODER"
            exit 1
          fi

          if [ -f "$CODET5_TOKENIZER" ]; then
            SIZE=$(du -h "$CODET5_TOKENIZER" | cut -f1)
            echo "✓ CodeT5 tokenizer: $SIZE"
          else
            echo "✗ CodeT5 tokenizer not found: $CODET5_TOKENIZER"
            exit 1
          fi

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: models-${{ matrix.quant_level }}
          path: |
            packages/models/dist/minilm-l6-${{ matrix.quant_level }}.onnx
            packages/models/dist/minilm-l6-tokenizer.json
            packages/models/dist/codet5-encoder-${{ matrix.quant_level }}.onnx
            packages/models/dist/codet5-decoder-${{ matrix.quant_level }}.onnx
            packages/models/dist/codet5-tokenizer.json
          retention-days: 30
          if-no-files-found: error
