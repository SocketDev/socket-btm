name: sweep-stale-workers
description: |
  Reap stale test/build worker processes left behind by a CI job.
  Same patterns the local Claude Code stale-process-sweeper hook
  uses: vitest workers / runners, tsgo daemons, type-coverage,
  esbuild service, Socket Firewall (sfw) wrappers. Orphan-only
  + stuck-worker heuristic (long elapsed + high CPU + high RSS).

  Run this with `if: always()` as the LAST step of a job that
  spawns workers (test runs, multi-package builds) so leaked
  processes don't pile up across job retries or fail-fast
  cancellations.

  No inputs. Best-effort: failures inside the sweeper never fail
  the job (exit 0 always).

runs:
  using: composite
  steps:
    - name: Reap stale workers
      shell: bash
      run: |
        # Locate the canonical hook. Most fleet repos check it in at
        # .claude/hooks/stale-process-sweeper/index.mts via the
        # socket-wheelhouse cascade. Skip silently if absent (the
        # repo doesn't ship the hook).
        SWEEPER="${GITHUB_WORKSPACE:-.}/.claude/hooks/stale-process-sweeper/index.mts"
        if [ ! -f "$SWEEPER" ]; then
          echo "[sweep-stale-workers] $SWEEPER not present — skipping"
          exit 0
        fi
        # Stop hooks receive a JSON payload on stdin; the sweeper
        # ignores the body. Pipe an empty object so the hook's
        # drain logic completes.
        echo '{}' | node "$SWEEPER" || true
