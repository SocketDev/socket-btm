name: 🔄 Update Release Checksums

on:
  workflow_call:
    secrets:
      BOT_GPG_PRIVATE_KEY:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-checksums:
    name: release-assets.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: SocketDev/socket-registry/.github/actions/setup-and-install@b86b2cb3fefa4ffa6c1a702476f9785f6c3bb887 # main

      - uses: SocketDev/socket-registry/.github/actions/setup-git-signing@b86b2cb3fefa4ffa6c1a702476f9785f6c3bb887 # main
        with:
          gpg-private-key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}

      - name: Update checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm --filter build-infra update-checksums

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet packages/build-infra/release-assets.json; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No checksum changes"
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Checksums updated"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has-changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add packages/build-infra/release-assets.json
          git commit -m "chore: update release checksums"
          git push

      - uses: SocketDev/socket-registry/.github/actions/cleanup-git-signing@b86b2cb3fefa4ffa6c1a702476f9785f6c3bb887 # main
        if: always()
