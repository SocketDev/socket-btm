name: SMOL 5. Node.js

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no release)'
        type: boolean
        default: true
      force:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false
      build_mode:
        description: 'Build mode'
        type: choice
        options:
          - prod
          - dev
        default: prod
      debug:
        description: 'Debug (0|1|namespace[,...])'
        type: string
        default: '0'
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: true
      force:
        type: boolean
        default: false
      build_mode:
        type: string
        default: prod
      debug:
        type: string
        default: '0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    permissions:
      contents: read
      id-token: write # OIDC authentication for Depot.dev builds
    name: Build (${{ matrix.platform == 'win32' && 'win' || matrix.platform }}-${{ matrix.arch }}${{ matrix.libc == 'musl' && '-musl' || '' }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 210
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds use Depot.dev ARM64 runner (8 vCPU M2, 24GB RAM).
          # darwin-x64 is cross-compiled from ARM64 via --dest-cpu=x64.
          - runner: depot-macos-15
            platform: darwin
            arch: arm64
            os: macos
          - runner: depot-macos-15
            platform: darwin
            arch: x64
            os: macos
            cross_compile: true

          # Linux glibc builds
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            os: linux
            libc: glibc
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            os: linux
            libc: glibc

          # Linux musl builds (Alpine)
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            os: linux
            libc: musl
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            os: linux
            libc: musl

          # Windows builds
          - runner: windows-2022
            platform: win32
            arch: x64
            os: windows
          # Windows ARM64: Cross-compile on x64 runner (no ARM64 hosted runners available)
          - runner: windows-2022
            platform: win32
            arch: arm64
            os: windows
            cross_compile: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Don't clone all submodules - only needed ones are initialized below.
          submodules: false

      - name: Get node submodule commit
        id: node-submodule
        shell: bash
        run: |
          # git ls-tree HEAD reads the gitlink from the outer repo's HEAD
          # (no submodule checkout required). Previously `git -C … rev-parse`
          # forced the node submodule to be initialized before cache-key
          # computation, which blocked gating the submodule init step on
          # cache-miss. Switching here unblocks that optimization.
          NODE_SUBMODULE_REF=$(git ls-tree HEAD packages/node-smol-builder/upstream/node 2>/dev/null | awk '{print $3}' | cut -c1-7)
          echo "ref=${NODE_SUBMODULE_REF}" >> $GITHUB_OUTPUT
          echo "Node submodule ref: ${NODE_SUBMODULE_REF}"

      - name: Enable debug logging
        uses: ./.github/actions/enable-debug-logging
        with:
          debug: ${{ inputs.debug }}

      - uses: SocketDev/socket-registry/.github/actions/setup@1594d82bb7b61015b615aad588c4d4763cb64194 # main

      - name: Load Node.js version
        id: node-version
        shell: bash
        run: |
          NODE_BUILD_VERSION=$(cat .node-version | tr -d '\n')
          echo "node-build-version=$NODE_BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "node-version=$NODE_BUILD_VERSION" >> $GITHUB_OUTPUT
          echo "Loaded Node.js build version: $NODE_BUILD_VERSION"

      - uses: SocketDev/socket-registry/.github/actions/install@1594d82bb7b61015b615aad588c4d4763cb64194 # main

      - name: Set build mode
        id: build-mode
        uses: ./.github/actions/set-build-mode
        with:
          build-mode: ${{ inputs.build_mode }}

      - name: Set platform-arch
        id: platform-arch
        uses: ./.github/actions/set-platform-arch
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          libc: ${{ matrix.libc }}

      # NOTE: GCC 13 is NOT installed here on the Ubuntu runner because:
      # - Node.js compilation happens inside Docker (Depot.dev runner) with AlmaLinux 8 + GCC Toolset 13
      # - Post-processing steps (strip, compress, finalize) only need standard tools (strip, objcopy)
      # - The ubuntu-toolchain-r PPA has unreliable network connectivity (Launchpad API timeouts)

      # Cache restore runs BEFORE any toolchain-install steps so that
      # `steps.checkpoint-cache.outputs.cache-hit` resolves for the install gates.
      # Without this ordering GHA returns an empty string for the unresolved step
      # output, gates evaluate `!= 'true'` as true, and every run reinstalls.
      - name: Load cache version from centralized config
        id: cache-version
        shell: bash
        run: |
          CACHE_VERSION=$(jq -r '.versions["node-smol"]' .github/cache-versions.json)
          if [ -z "$CACHE_VERSION" ] || [ "$CACHE_VERSION" = "null" ]; then
            echo "× Error: Cache version not found for node-smol in .github/cache-versions.json"
            exit 1
          fi
          # Per CLAUDE.md cache cascade: lief and stubs source changes must
          # invalidate node-smol checkpoints. node-smol embeds binpress which
          # uses LIEF and the stubs binary — a LIEF or stubs cache-version
          # bump (even without a source edit) MUST produce a new node-smol
          # cache key, otherwise the stale tarball is served.
          LIEF_VERSION=$(jq -r '.versions["lief"]' .github/cache-versions.json)
          STUBS_VERSION=$(jq -r '.versions["stubs"]' .github/cache-versions.json)
          if [ -z "$LIEF_VERSION" ] || [ "$LIEF_VERSION" = "null" ]; then
            echo "× Error: Cache version not found for lief in .github/cache-versions.json"
            exit 1
          fi
          if [ -z "$STUBS_VERSION" ] || [ "$STUBS_VERSION" = "null" ]; then
            echo "× Error: Cache version not found for stubs in .github/cache-versions.json"
            exit 1
          fi
          echo "version=$CACHE_VERSION" >> $GITHUB_OUTPUT
          echo "lief_version=$LIEF_VERSION" >> $GITHUB_OUTPUT
          echo "stubs_version=$STUBS_VERSION" >> $GITHUB_OUTPUT
          echo "Cache version: $CACHE_VERSION (lief=$LIEF_VERSION stubs=$STUBS_VERSION)"

      - name: Generate smol build cache key
        id: smol-cache-key
        shell: bash
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          CACHE_VERSION: ${{ steps.cache-version.outputs.version }}
          LIEF_VERSION: ${{ steps.cache-version.outputs.lief_version }}
          STUBS_VERSION: ${{ steps.cache-version.outputs.stubs_version }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          # Cross-platform hash function
          if command -v shasum &> /dev/null; then
            hash_cmd="shasum -a 256"
          elif command -v sha256sum &> /dev/null; then
            hash_cmd="sha256sum"
          elif command -v certutil &> /dev/null; then
            # Windows fallback using certutil
            echo "Warning: Using certutil for hashing (Windows fallback)"
            hash_cmd="certutil -hashfile"
          else
            echo "Error: No SHA-256 command found (tried shasum, sha256sum, certutil)"
            exit 1
          fi

          # Two hashing helpers with different missing-path semantics:
          #   hash_files           — strict; exits 1 if every positional path is
          #                          missing. For single-path callers where a
          #                          missing directory is a real bug.
          #   hash_files_optional  — tolerant; returns "" if every positional
          #                          path is missing. For hierarchical callers
          #                          that pass overlapping layers (base, base/
          #                          shared, base/<platform>/shared, base/<plat>/
          #                          <arch>) where most layers may legitimately
          #                          not exist for a given phase.
          #
          # The hierarchical sources (patches/source-copied/, additions/
          # source-copied/, patches/binary-released/, etc.) are intentionally
          # sparse — only patches/source-patched and additions/source-patched
          # are currently populated — so the hierarchical callers MUST use the
          # tolerant variant. The strict variant catches directory-reshuffle
          # bugs on single-path callers.

          _hash_files_impl() {
            # sort -u dedupes so overlapping hierarchical paths (base +
            # base/shared + ...) don't double-hash shared files.
            # LC_COLLATE=C pins sort to byte-order so cache keys stay
            # locale-independent across runner images.
            local files=$(find "$@" 2>/dev/null | LC_COLLATE=C sort -u)
            if [ -n "$files" ]; then
              echo "$files" | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1
            else
              echo ""
            fi
          }

          _any_positional_exists() {
            for arg in "$@"; do
              case "$arg" in
                -*) break ;;
              esac
              if [ -e "$arg" ]; then
                return 0
              fi
            done
            return 1
          }

          hash_files() {
            if ! _any_positional_exists "$@"; then
              echo "× hash_files: no input path exists (got: $*)" >&2
              exit 1
            fi
            _hash_files_impl "$@"
          }

          hash_files_optional() {
            _hash_files_impl "$@"
          }

          # Helper function to get hierarchical paths for a category/phase/platform/arch.
          # Returns: base/, base/shared/, base/platform/shared/, base/platform/arch/
          # `base/` itself is included so top-level files (e.g. patches/source-patched/*.patch
          # live directly at the base, not in subdirs) are covered.
          get_hierarchical_paths() {
            local category=$1    # scripts, patches, additions
            local phase=$2       # source-copied, source-patched, binary-released, binary-stripped, binary-compressed, finalized
            local platform=$3    # darwin, linux, linux-musl, win32
            local arch=$4        # arm64, x64

            local base="packages/node-smol-builder/${category}/${phase}"

            echo "${base} ${base}/shared ${base}/${platform}/shared ${base}/${platform}/${arch}"
          }

          # Get platform and arch from matrix
          PLATFORM="${MATRIX_PLATFORM}"
          ARCH="${MATRIX_ARCH}"

          # Phase-specific hashing for granular cache invalidation
          # Each phase includes its dependencies (cumulative hashing)
          # Now with hierarchical paths: shared/ → platform/shared/ → platform/arch/

          # Get cache version for inclusion in hash

          # Common scripts (used by all phases) - hierarchical
          # Each checkpoint now has its own paths.mts that re-exports from scripts/paths.mts
          # This makes dependencies explicit and ensures changes to paths.mts are tracked per-checkpoint
          COMMON_PATHS=$(get_hierarchical_paths scripts common "$PLATFORM" "$ARCH")
          COMMON_SCRIPTS=$(hash_files_optional $COMMON_PATHS -type f -name "*.mts")

          # source-copied phase: cache-version + common + patches/source-copied + additions/source-copied + scripts/source-copied
          # The hierarchical paths for source-copied / binary-* / finalized are
          # sparse by design — only patches/source-patched and additions/
          # source-patched are populated in this repo. hash_files_optional
          # returns "" when every layer is missing, so an empty phase still
          # produces a stable hash that invalidates if a layer IS created later.
          SOURCE_COPIED_PATCH_PATHS=$(get_hierarchical_paths patches source-copied "$PLATFORM" "$ARCH")
          SOURCE_COPIED_ADDITION_PATHS=$(get_hierarchical_paths additions source-copied "$PLATFORM" "$ARCH")
          SOURCE_COPIED_SCRIPT_PATHS=$(get_hierarchical_paths scripts source-copied "$PLATFORM" "$ARCH")
          SOURCE_COPIED_PATCHES=$(hash_files_optional $SOURCE_COPIED_PATCH_PATHS -type f)
          SOURCE_COPIED_ADDITIONS=$(hash_files_optional $SOURCE_COPIED_ADDITION_PATHS -type f)
          SOURCE_COPIED_SCRIPTS=$(hash_files_optional $SOURCE_COPIED_SCRIPT_PATHS -type f -name "*.mts")

          # source-patched phase: source-copied + patches/source-patched + additions/source-patched + scripts/source-patched
          SOURCE_PATCHED_PATCH_PATHS=$(get_hierarchical_paths patches source-patched "$PLATFORM" "$ARCH")
          SOURCE_PATCHED_ADDITION_PATHS=$(get_hierarchical_paths additions source-patched "$PLATFORM" "$ARCH")
          SOURCE_PATCHED_SCRIPT_PATHS=$(get_hierarchical_paths scripts source-patched "$PLATFORM" "$ARCH")
          SOURCE_PATCHED_PATCHES=$(hash_files_optional $SOURCE_COPIED_PATCH_PATHS $SOURCE_PATCHED_PATCH_PATHS -type f)
          SOURCE_PATCHED_ADDITIONS=$(hash_files_optional $SOURCE_COPIED_ADDITION_PATHS $SOURCE_PATCHED_ADDITION_PATHS -type f)
          SOURCE_PATCHED_SCRIPTS=$(hash_files_optional $SOURCE_COPIED_SCRIPT_PATHS $SOURCE_PATCHED_SCRIPT_PATHS -type f -name "*.mts")

          # Binary-release phase: source-patched + patches/binary-released + additions/binary-released + scripts/binary-released
          BINARY_RELEASED_PATCH_PATHS=$(get_hierarchical_paths patches binary-released "$PLATFORM" "$ARCH")
          BINARY_RELEASED_ADDITION_PATHS=$(get_hierarchical_paths additions binary-released "$PLATFORM" "$ARCH")
          BINARY_RELEASED_SCRIPT_PATHS=$(get_hierarchical_paths scripts binary-released "$PLATFORM" "$ARCH")
          BINARY_RELEASED_PATCHES=$(hash_files_optional $SOURCE_COPIED_PATCH_PATHS $SOURCE_PATCHED_PATCH_PATHS $BINARY_RELEASED_PATCH_PATHS -type f)
          BINARY_RELEASED_ADDITIONS=$(hash_files_optional $SOURCE_COPIED_ADDITION_PATHS $SOURCE_PATCHED_ADDITION_PATHS $BINARY_RELEASED_ADDITION_PATHS -type f)
          BINARY_RELEASED_SCRIPTS=$(hash_files_optional $SOURCE_COPIED_SCRIPT_PATHS $SOURCE_PATCHED_SCRIPT_PATHS $BINARY_RELEASED_SCRIPT_PATHS -type f -name "*.mts")

          # Binary-stripped phase: binary-released + patches/binary-stripped + additions/binary-stripped + scripts/binary-stripped
          BINARY_STRIPPED_PATCH_PATHS=$(get_hierarchical_paths patches binary-stripped "$PLATFORM" "$ARCH")
          BINARY_STRIPPED_ADDITION_PATHS=$(get_hierarchical_paths additions binary-stripped "$PLATFORM" "$ARCH")
          BINARY_STRIPPED_SCRIPT_PATHS=$(get_hierarchical_paths scripts binary-stripped "$PLATFORM" "$ARCH")
          BINARY_STRIPPED_PATCHES=$(hash_files_optional $BINARY_RELEASED_PATCH_PATHS $BINARY_STRIPPED_PATCH_PATHS -type f)
          BINARY_STRIPPED_ADDITIONS=$(hash_files_optional $BINARY_RELEASED_ADDITION_PATHS $BINARY_STRIPPED_ADDITION_PATHS -type f)
          BINARY_STRIPPED_SCRIPTS=$(hash_files_optional $BINARY_RELEASED_SCRIPT_PATHS $BINARY_STRIPPED_SCRIPT_PATHS -type f -name "*.mts")

          # Binary-compressed phase: binary-released + binary-stripped + patches/binary-compressed + additions/binary-compressed + scripts/binary-compressed
          BINARY_COMPRESSED_PATCH_PATHS=$(get_hierarchical_paths patches binary-compressed "$PLATFORM" "$ARCH")
          BINARY_COMPRESSED_ADDITION_PATHS=$(get_hierarchical_paths additions binary-compressed "$PLATFORM" "$ARCH")
          BINARY_COMPRESSED_SCRIPT_PATHS=$(get_hierarchical_paths scripts binary-compressed "$PLATFORM" "$ARCH")
          BINARY_COMPRESSED_PATCHES=$(hash_files_optional $BINARY_RELEASED_PATCH_PATHS $BINARY_STRIPPED_PATCH_PATHS $BINARY_COMPRESSED_PATCH_PATHS -type f)
          BINARY_COMPRESSED_ADDITIONS=$(hash_files_optional $BINARY_RELEASED_ADDITION_PATHS $BINARY_STRIPPED_ADDITION_PATHS $BINARY_COMPRESSED_ADDITION_PATHS -type f)
          BINARY_COMPRESSED_SCRIPTS=$(hash_files_optional $BINARY_RELEASED_SCRIPT_PATHS $BINARY_STRIPPED_SCRIPT_PATHS $BINARY_COMPRESSED_SCRIPT_PATHS -type f -name "*.mts")

          # Finalized phase: binary-released + binary-stripped + binary-compressed + patches/finalized + additions/finalized + scripts/finalized
          FINAL_PATCH_PATHS=$(get_hierarchical_paths patches finalized "$PLATFORM" "$ARCH")
          FINAL_ADDITION_PATHS=$(get_hierarchical_paths additions finalized "$PLATFORM" "$ARCH")
          FINAL_SCRIPT_PATHS=$(get_hierarchical_paths scripts finalized "$PLATFORM" "$ARCH")
          FINAL_PATCHES=$(hash_files_optional $BINARY_RELEASED_PATCH_PATHS $BINARY_STRIPPED_PATCH_PATHS $BINARY_COMPRESSED_PATCH_PATHS $FINAL_PATCH_PATHS -type f)
          FINAL_ADDITIONS=$(hash_files_optional $BINARY_RELEASED_ADDITION_PATHS $BINARY_STRIPPED_ADDITION_PATHS $BINARY_COMPRESSED_ADDITION_PATHS $FINAL_ADDITION_PATHS -type f)
          FINAL_SCRIPTS=$(hash_files_optional $SOURCE_COPIED_SCRIPT_PATHS $SOURCE_PATCHED_SCRIPT_PATHS $BINARY_RELEASED_SCRIPT_PATHS $BINARY_STRIPPED_SCRIPT_PATHS $BINARY_COMPRESSED_SCRIPT_PATHS $FINAL_SCRIPT_PATHS -type f -name "*.mts")

          # Hash canonical source packages (source of truth - additions/ syncs FROM these).
          # Per CLAUDE.md cache cascade: bin-infra, build-infra, binject, AND binpress
          # source changes must invalidate node-smol checkpoints.
          BUILD_INFRA_SRC=$(hash_files packages/build-infra/src/socketsecurity/build-infra -type f)
          BIN_INFRA_SRC=$(hash_files packages/bin-infra/src/socketsecurity/bin-infra -type f)
          BINJECT_SRC=$(hash_files packages/binject/src/socketsecurity/binject -type f)
          BINPRESS_SRC=$(hash_files packages/binpress/src -type f)
          # TypeScript helper libraries used by the build scripts. Edits
          # to build-infra/lib/checkpoint-manager.mts or bin-infra/lib/*
          # change how the final tarball is produced but were not hashed
          # before R10 — bug fixes in checkpoint-manager would silently
          # hit stale cache.
          BUILD_INFRA_LIB=$(hash_files packages/build-infra/lib -type f)
          BIN_INFRA_LIB=$(hash_files packages/bin-infra/lib -type f)
          # pnpm-lock.yaml: Docker builds and host-side `node` commands
          # run against installed workspace deps; a lock bump that pulls
          # a new @socketsecurity/lib can change build behavior. Hash so
          # the cache invalidates when deps change.
          PNPM_LOCK_HASH=$($hash_cmd pnpm-lock.yaml 2>/dev/null | cut -d' ' -f1)
          # Root package.json + pnpm-workspace.yaml hold catalog versions,
          # overrides, trustPolicy, minimumReleaseAge. `pnpm install`
          # consults all of them — a catalog bump changes what the build
          # sees. pnpm-lock.yaml covers most but not all of this.
          # Unhashed before R24.
          ROOT_PACKAGE_JSON_HASH=$($hash_cmd package.json 2>/dev/null | cut -d' ' -f1)
          PNPM_WORKSPACE_HASH=$($hash_cmd pnpm-workspace.yaml 2>/dev/null | cut -d' ' -f1)

          # Linux builds are produced by Depot.dev consuming the Dockerfiles
          # under packages/node-smol-builder/docker/. A Dockerfile edit (e.g.
          # toolchain bump, glibc floor change) MUST invalidate the cache —
          # otherwise a stale cache hit serves a binary built against the old
          # image.
          DOCKERFILES=$(hash_files packages/node-smol-builder/docker -type f)

          # node-smol-builder/make/ holds pack-rules.mk and stub-rules.mk
          # which are `include`d by the binjected Makefiles. Edits there
          # change how binpress/binflate are copied into the final layout.
          NODE_SMOL_MAKE=$(hash_files packages/node-smol-builder/make -type f)
          # Upstream make/ files from sibling builders that node-smol
          # links or consumes artifacts from.
          LIEF_MAKE=$(hash_files packages/lief-builder/make -type f)
          BINJECT_MAKE=$(hash_files packages/binject/make -type f)
          # Shared .mk infrastructure used by EVERY downstream builder's
          # Makefile (common.mk, crypto.mk, platform-*.mk, zstd.mk).
          # An edit to e.g. crypto.mk's CFLAGS changes binpress/binflate/
          # binject which node-smol embeds, but the upstream cache-version
          # bumps don't always propagate — hash directly here for
          # belt-and-suspenders.
          BUILD_INFRA_MAKE=$(hash_files packages/build-infra/make -type f)
          BIN_INFRA_MAKE=$(hash_files packages/bin-infra/make -type f)
          STUBS_MAKE=$(hash_files packages/stubs-builder/make -type f)

          # Submodule SHAs: the final node binary links against uSockets /
          # uWebSockets (compiled into smol-http) and liburing (used by
          # iouring transport). A submodule bump that doesn't touch
          # .gitmodules (e.g. `git submodule update --remote`) would
          # otherwise leave the cache key unchanged and serve a stale
          # binary built against the old code. `git ls-tree` reads the
          # commit gitlink directly from HEAD, matching the SHA the build
          # will actually check out. Empty string if the path isn't a
          # gitlink (dev machine without the submodule initialized) —
          # which still keys distinctly from "submodule at SHA X".
          USOCKETS_SHA=$(git ls-tree HEAD packages/node-smol-builder/upstream/uSockets 2>/dev/null | awk '{print $3}')
          UWEBSOCKETS_SHA=$(git ls-tree HEAD packages/node-smol-builder/upstream/uWebSockets 2>/dev/null | awk '{print $3}')
          LIBURING_SHA=$(git ls-tree HEAD packages/node-smol-builder/upstream/liburing 2>/dev/null | awk '{print $3}')
          # curl and mbedtls SHAs: node-smol embeds the stubs binary via
          # binpress; stubs links libcurl. A curl or mbedtls submodule
          # bump therefore changes the final node binary and MUST bust
          # the node-smol cache.
          CURL_SHA=$(git ls-tree HEAD packages/curl-builder/upstream/curl 2>/dev/null | awk '{print $3}')
          MBEDTLS_SHA=$(git ls-tree HEAD packages/curl-builder/upstream/mbedtls 2>/dev/null | awk '{print $3}')
          # zstd, libdeflate, cJSON SHAs: node-smol embeds binpress and
          # binflate (both link zstd) and binject (links libdeflate +
          # cJSON). A `git submodule update --remote` bump to any of
          # them without touching .gitmodules would otherwise leave the
          # cache key unchanged and serve a stale binary built against
          # the previous upstream.
          ZSTD_SHA=$(git ls-tree HEAD packages/bin-infra/upstream/zstd 2>/dev/null | awk '{print $3}')
          LIBDEFLATE_SHA=$(git ls-tree HEAD packages/binject/upstream/libdeflate 2>/dev/null | awk '{print $3}')
          CJSON_SHA=$(git ls-tree HEAD packages/binject/upstream/cJSON 2>/dev/null | awk '{print $3}')
          # binflate src: the node binary is compressed and self-extracts
          # via the binflate runtime. Edits to binflate/src change the
          # final tarball even when no other source changed.
          BINFLATE_SRC=$(hash_files packages/binflate/src -type f)

          # Top-level scripts/ helpers used by every per-phase build.mts:
          # paths.mts is re-exported by scripts/<phase>/shared/paths.mts,
          # lib/*.mts holds build-summary and other shared helpers, and
          # vendor-fast-webstreams/ runs during binary-released to
          # regenerate the embedded polyfill. setup-build-toolchain.mts
          # runs as the package's postinstall (package.json:14), so it
          # executes inside every Docker build stage that COPIes workspace
          # deps — edits to it change the toolchain installed into the
          # image. None of those are captured by get_hierarchical_paths
          # (which targets scripts/<phase>/).
          SCRIPTS_TOP=$(hash_files packages/node-smol-builder/scripts/paths.mts packages/node-smol-builder/scripts/get-checkpoint-chain.mts packages/node-smol-builder/scripts/setup-build-toolchain.mts -type f)
          SCRIPTS_LIB=$(hash_files packages/node-smol-builder/scripts/lib -type f)
          VENDOR_FASTWS=$(hash_files packages/node-smol-builder/scripts/vendor-fast-webstreams -type f)

          # Package-root metadata: external-tools.json pins toolchain
          # versions consumed by pinned-versions.mts; package.json carries
          # sources.<upstream>.version and devDependencies that feed the
          # build. Both affect output but were not previously hashed.
          EXTERNAL_TOOLS_ROOT=$($hash_cmd packages/node-smol-builder/external-tools.json 2>/dev/null | cut -d' ' -f1)
          PACKAGE_JSON_ROOT=$($hash_cmd packages/node-smol-builder/package.json 2>/dev/null | cut -d' ' -f1)

          # build-infra/external-tools.json pins the foundational
          # toolchain (cmake, ninja, clang, gcc, mingw-w64, python,
          # binutils, …). build-infra/scripts/ holds shared helpers
          # (get-checkpoint-chain, smoke-test-binary) that change build
          # behavior across every consumer. lief-builder/{lib,scripts}/
          # holds ensure-lief which binject/binpress import directly.
          # All three were unhashed before R20.
          BUILD_INFRA_EXTERNAL_TOOLS=$($hash_cmd packages/build-infra/external-tools.json 2>/dev/null | cut -d' ' -f1)
          BUILD_INFRA_SCRIPTS=$(hash_files packages/build-infra/scripts -type f)
          LIEF_LIB_SCRIPTS=$(hash_files packages/lief-builder/lib packages/lief-builder/scripts packages/lief-builder/docker -type f)
          # .github/scripts/ holds Docker bootstrappers (build-static-
          # openssl.sh hard-codes OPENSSL_VERSION; ensure-zstd.sh
          # fetches zstd if the submodule is absent). RUN'd from every
          # binsuite + stubs + node-smol Dockerfile. Unhashed before R21.
          GITHUB_SCRIPTS=$(hash_files .github/scripts -type f)
          # Socket-registry propagation SHA — extracted from THIS
          # workflow's own YAML at runtime, not via a catalog lookup.
          # A registry cascade bump (which edits the @<sha> pin in
          # this file) flows through to a cache-key change here, so
          # the checkpoint cache invalidates whenever the registry
          # provisions a new pnpm version / zizmor build / etc. That
          # makes .build-context/registry-tools.json — whose contents
          # are materialized per-run from SOCKET_TOOL_CHECKSUMS_FILE
          # — implicitly part of the cache key.
          WORKFLOW_FILE="${GITHUB_WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE#${GITHUB_REPOSITORY}/}"
          SOCKET_REGISTRY_SHA=$(grep -ohE 'SocketDev/socket-registry/[^@]+@[0-9a-f]{40}' "$WORKFLOW_FILE" 2>/dev/null | head -1 | grep -oE '[0-9a-f]{40}$' || echo "")

          FINAL_HASH=$(echo "${COMMON_SCRIPTS}${FINAL_PATCHES}${FINAL_ADDITIONS}${FINAL_SCRIPTS}${SCRIPTS_TOP}${SCRIPTS_LIB}${VENDOR_FASTWS}${BUILD_INFRA_SRC}${BIN_INFRA_SRC}${BUILD_INFRA_LIB}${BIN_INFRA_LIB}${BUILD_INFRA_EXTERNAL_TOOLS}${BUILD_INFRA_SCRIPTS}${BINJECT_SRC}${BINPRESS_SRC}${BINFLATE_SRC}${DOCKERFILES}${GITHUB_SCRIPTS}${PNPM_LOCK_HASH}${ROOT_PACKAGE_JSON_HASH}${PNPM_WORKSPACE_HASH}${EXTERNAL_TOOLS_ROOT}${PACKAGE_JSON_ROOT}${NODE_SMOL_MAKE}${LIEF_MAKE}${LIEF_LIB_SCRIPTS}${BINJECT_MAKE}${BUILD_INFRA_MAKE}${BIN_INFRA_MAKE}${STUBS_MAKE}${LIEF_VERSION}${STUBS_VERSION}${USOCKETS_SHA}${UWEBSOCKETS_SHA}${LIBURING_SHA}${CURL_SHA}${MBEDTLS_SHA}${ZSTD_SHA}${LIBDEFLATE_SHA}${CJSON_SHA}${SOCKET_REGISTRY_SHA}" | $hash_cmd | cut -d' ' -f1)

          echo "final_hash=${FINAL_HASH}" >> $GITHUB_OUTPUT
          echo "build_mode=${BUILD_MODE}" >> $GITHUB_OUTPUT

      # Hoist canonical node-smol paths into step outputs so every
      # downstream step (cache, validate, run blocks, upload-artifact)
      # reads from one place. Mirrors
      # packages/node-smol-builder/scripts/paths.mts:getBuildPaths() —
      # any change to that function's output layout MUST be reflected here.
      - name: Compute node-smol paths
        id: paths
        env:
          BUILD_MODE: ${{ steps.smol-cache-key.outputs.build_mode }}
          PLATFORM_ARCH: ${{ steps.platform-arch.outputs.platform_arch }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          PACKAGE_DIR="packages/node-smol-builder"
          PLATFORM_BUILD_DIR="${PACKAGE_DIR}/build/${BUILD_MODE}/${PLATFORM_ARCH}"
          OUT_DIR="${PLATFORM_BUILD_DIR}/out"
          RELEASE_DIR="${OUT_DIR}/Release"
          FINAL_DIR="${OUT_DIR}/Final"
          FINAL_NODE_DIR="${FINAL_DIR}/node"
          CHECKPOINTS_DIR="${PLATFORM_BUILD_DIR}/checkpoints"
          SOURCE_OUT_DIR="${PLATFORM_BUILD_DIR}/source/out"
          if [ "$MATRIX_OS" = "windows" ]; then
            BINARY_NAME="node.exe"
          else
            BINARY_NAME="node"
          fi
          {
            echo "package_dir=${PACKAGE_DIR}"
            echo "platform_build_dir=${PLATFORM_BUILD_DIR}"
            echo "out_dir=${OUT_DIR}"
            echo "release_dir=${RELEASE_DIR}"
            echo "final_dir=${FINAL_DIR}"
            echo "final_node_dir=${FINAL_NODE_DIR}"
            echo "checkpoints_dir=${CHECKPOINTS_DIR}"
            echo "source_out_dir=${SOURCE_OUT_DIR}"
            echo "binary_name=${BINARY_NAME}"
            echo "final_binary=${FINAL_NODE_DIR}/${BINARY_NAME}"
            echo "release_binary=${RELEASE_DIR}/node/${BINARY_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore checkpoint cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: checkpoint-cache
        if: ${{ !inputs.force }}
        with:
          path: |
            packages/node-smol-builder/build/shared/checkpoints
            ${{ steps.paths.outputs.checkpoints_dir }}
          key: node-checkpoints-${{ steps.cache-version.outputs.version }}-${{ steps.node-version.outputs.node-build-version }}-${{ steps.node-submodule.outputs.ref }}-${{ steps.platform-arch.outputs.platform_arch }}-${{ steps.smol-cache-key.outputs.build_mode }}-${{ steps.smol-cache-key.outputs.final_hash }}

      - name: Get checkpoint chain
        id: checkpoint-chain
        shell: bash
        env:
          BUILD_MODE: ${{ steps.smol-cache-key.outputs.build_mode }}
        run: |
          # Get checkpoint chain from build script (single source of truth)
          CHAIN=$(node packages/node-smol-builder/scripts/get-checkpoint-chain.mts --$BUILD_MODE)
          echo "checkpoint_chain=$CHAIN" >> $GITHUB_OUTPUT
          # Convert comma-separated to space-separated for validation
          CHECKPOINTS=$(echo "$CHAIN" | tr ',' ' ')
          echo "checkpoints=$CHECKPOINTS" >> $GITHUB_OUTPUT
          echo "Checkpoint chain for $BUILD_MODE mode: $CHAIN"

      - name: Validate checkpoint cache integrity
        id: validate-cache
        if: steps.checkpoint-cache.outputs.cache-hit == 'true'
        uses: ./.github/actions/validate-checkpoints
        with:
          checkpoint-dirs: packages/node-smol-builder/build/shared/checkpoints:${{ steps.paths.outputs.checkpoints_dir }}
          checkpoints: ${{ steps.checkpoint-chain.outputs.checkpoints }}
          package-name: node-smol-builder

      # NOTE on install-step gating below: the `validate-cache` action emits
      # `valid` as one of 'true' / 'false' / 'partial'. 'partial' means a
      # non-latest checkpoint in the chain restored — the build will resume
      # from it, so the toolchain IS still needed. We gate the install steps
      # on `valid != 'true'` (false OR partial) so partial-validity doesn't
      # skip toolchain installation. These steps run BEFORE restore-checkpoint,
      # so we can't reference `steps.restore-checkpoint.outputs.build-required`
      # here the way post-restore steps (e.g. the finalize job) do.

      - name: Install musl toolchain (Linux musl - host-side tools)
        # Linux musl compilation itself runs inside Depot's Docker image, so
        # the musl cross-compiler isn't strictly required on the host. This
        # step installs musl-tools / gcc-aarch64-linux-gnu for post-build
        # host-side tasks: smoke-test-binary.mts may invoke ldd / file /
        # strip through these binaries when inspecting the musl tarball
        # that Depot uploaded. Keep this step gated on cache-miss so it
        # doesn't waste time on cache hits (which also skip the smoke test).
        if: matrix.os == 'linux' && matrix.libc == 'musl' && (steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force)
        shell: bash
        env:
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          sudo apt-get install -y musl-tools

          # ARM64 build needs the aarch64 cross-linker for host-side post-processing.
          if [ "$MATRIX_ARCH" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Select Xcode (macOS)
        if: matrix.os == 'macos' && (steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force)
        uses: ./.github/actions/select-xcode

      - name: Setup Depot CLI
        if: matrix.os == 'linux' && (steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force)
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1
        with:
          oidc: true

      - name: Setup ccache (Unix)
        if: matrix.os != 'windows' && (steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force)
        uses: hendrikmuhs/ccache-action@1bbbcda0748b3e340dee71a314fa68ffcbd6df79 # v1.2.21
        with:
          key: ${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.libc && format('-{0}', matrix.libc) || '' }}-${{ steps.build-mode.outputs.mode }}
          # macOS: Depot.dev has 24GB RAM - can afford larger ccache
          # Linux has less RAM, keep at 2GB
          max-size: ${{ matrix.os == 'macos' && '4G' || '2G' }}
          save: ${{ steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force }}

      - name: Setup ccache (Windows)
        if: matrix.os == 'windows' && (steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force)
        uses: hendrikmuhs/ccache-action@1bbbcda0748b3e340dee71a314fa68ffcbd6df79 # v1.2.21
        with:
          key: windows-${{ matrix.platform }}-${{ matrix.arch }}-${{ steps.build-mode.outputs.mode }}
          max-size: 2G
          variant: sccache
          save: ${{ steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force }}

      - name: Setup Windows build tools
        if: matrix.os == 'windows' && (steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force)
        shell: bash
        run: |
          # Install LLVM/Clang for MSVC-compatible builds
          # Using clang avoids MinGW runtime DLL dependencies
          choco install -y llvm
          clang --version

      # NOTE: Compression tools are now built automatically during the build process
      # The build script (build-compressed.mts) calls ensureCompressionToolsBuilt()
      # which checks if tools exist and builds them if needed. No manual step required.

      - name: Install compression tool dependencies (Linux)
        if: matrix.os == 'linux' && (steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid != 'true' || inputs.force)
        shell: bash
        run: |
          # Install OpenSSL development headers for Linux builds
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Determine build parallelism
        id: build-parallelism
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          # Set step output using GitHub Actions file-based approach
          # Usage: echo "key=value" >> $GITHUB_OUTPUT
          # Reference later as: steps.STEP_ID.outputs.key
          #
          # Limit parallelism to prevent memory exhaustion during V8 compilation
          # V8 compilation with -O3 uses ~4-6GB RAM per job

          # Linux ARM64: 3 jobs (8GB RAM, 4 vCPU) - increased for timeout concerns
          if [[ "$MATRIX_PLATFORM" == "linux" ]] && [[ "$MATRIX_ARCH" == "arm64" ]]; then
            echo "jobs=3" >> $GITHUB_OUTPUT  # → steps.build-parallelism.outputs.jobs = "3"

          # macOS Depot.dev: 4 jobs (24GB RAM, 8 vCPU M2)
          # 24GB / 4GB per job = 6 max, use 4 for safety margin
          elif [[ "$MATRIX_OS" == "macos" ]]; then
            echo "jobs=4" >> $GITHUB_OUTPUT  # → steps.build-parallelism.outputs.jobs = "4"

          # Linux x64: Auto-calculate based on RAM (typically 3-4 jobs)
          else
            echo "jobs=" >> $GITHUB_OUTPUT   # → steps.build-parallelism.outputs.jobs = "" (triggers adaptive calculation in build script)
          fi

      - name: Restore build output from checkpoint chain
        id: restore-checkpoint
        uses: ./.github/actions/restore-checkpoint
        with:
          package-name: 'node-smol-builder'
          build-mode: ${{ steps.smol-cache-key.outputs.build_mode }}
          checkpoint-chain: ${{ steps.checkpoint-chain.outputs.checkpoint_chain }}
          cache-hit: ${{ steps.checkpoint-cache.outputs.cache-hit }}
          cache-valid: ${{ steps.validate-cache.outputs.valid }}
          platform-arch: ${{ steps.platform-arch.outputs.platform_arch }}

      # Resolve Python pin only on cache-miss / build-required runs.
      # The previous "Load tool versions" step ran node + an mts file
      # unconditionally on every matrix entry just to feed this single
      # consumer; on full cache-hit it was dead work.
      - name: Resolve Python version
        id: python-version
        if: steps.restore-checkpoint.outputs.build-required != 'false' || inputs.force
        shell: bash
        run: |
          PYTHON_VERSION=$(node packages/build-infra/scripts/get-tool-version.mts python version)
          echo "python-version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "Python version: $PYTHON_VERSION"

      - name: Setup Python
        if: steps.restore-checkpoint.outputs.build-required != 'false' || inputs.force
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '${{ steps.python-version.outputs.python-version }}'

      - name: Install QEMU and Docker (Linux - for cross-compiled binary testing)
        if: matrix.os == 'linux' && matrix.runner == 'ubuntu-24.04' && (matrix.arch == 'arm64' || matrix.libc == 'musl') && (steps.restore-checkpoint.outputs.build-required != 'false' || inputs.force)
        shell: bash
        env:
          # Route matrix values through env so zizmor's template-injection
          # audit passes — it flags ${{ matrix.* }} directly in shell
          # bodies because those expansions happen before the shell ever
          # sees the string. Going via env means the shell reads a plain
          # variable that can be properly quoted.
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_LIBC: ${{ matrix.libc }}
        run: |
          sudo apt-get update

          # Install QEMU for ARM64 emulation (if ARM64 build)
          if [ "$MATRIX_ARCH" = "arm64" ]; then
            echo "Installing QEMU user-mode for ARM64 emulation..."
            sudo apt-get install -y qemu-user-static
            echo "[OK] QEMU installed"
          fi

          # Docker is pre-installed on GitHub Actions runners (for musl testing)
          if [ "$MATRIX_LIBC" = "musl" ]; then
            echo "Verifying Docker is available for musl testing..."
            docker --version || echo "⚠ Docker not available"
          fi

      - name: Initialize submodules (cache-miss only)
        # Gated on cache-miss because none of the pre-restore steps need
        # the submodules: `Get node submodule commit` uses `git ls-tree
        # HEAD` (R12), the cache-key composition uses `git ls-tree HEAD`
        # for each upstream/*, and setup/install/Python don't require
        # the checkouts. On cache-hit we save a ~1-2 min clone for the
        # Node submodule alone, plus zstd/libdeflate/uSockets/uWebSockets.
        if: steps.restore-checkpoint.outputs.build-required != 'false' || inputs.force
        uses: ./.github/actions/init-submodules
        with:
          submodules: >-
            packages/node-smol-builder/upstream/node
            packages/bin-infra/upstream/zstd
            packages/binject/upstream/libdeflate
            packages/node-smol-builder/upstream/uSockets
            packages/node-smol-builder/upstream/uWebSockets

      - name: Initialize liburing submodule (Linux only)
        if: matrix.os == 'linux' && (steps.restore-checkpoint.outputs.build-required != 'false' || inputs.force)
        uses: ./.github/actions/init-submodules
        with:
          submodules: packages/node-smol-builder/upstream/liburing

      - name: Validate Node.js submodule vendored files
        if: steps.restore-checkpoint.outputs.build-required != 'false' || inputs.force
        shell: bash
        run: |
          ACORN_FILE="packages/node-smol-builder/upstream/node/deps/acorn/acorn/dist/acorn.js"
          if [ ! -f "$ACORN_FILE" ]; then
            echo "ERROR: Required vendored file missing: $ACORN_FILE"
            echo "Listing contents of deps/acorn/acorn/dist/:"
            ls -la packages/node-smol-builder/upstream/node/deps/acorn/acorn/dist/ || echo "Directory does not exist"
            echo "Listing contents of deps/acorn/acorn/:"
            ls -la packages/node-smol-builder/upstream/node/deps/acorn/acorn/ || echo "Directory does not exist"
            echo "Git submodule status:"
            git submodule status packages/node-smol-builder/upstream/node
            exit 1
          fi
          echo "[OK] Verified acorn.js exists: $ACORN_FILE"
          ls -lh "$ACORN_FILE"

      - name: Stage registry tool-checksums for Docker build context
        if: matrix.os == 'linux' && steps.restore-checkpoint.outputs.build-required != 'false'
        shell: bash
        run: |
          # Socket-registry's setup action exports SOCKET_TOOL_CHECKSUMS_FILE
          # pointing at a stable on-runner copy of external-tools.json.
          # Dockerfiles `COPY .build-context/registry-tools.json …` to
          # resolve pnpm version + per-platform asset + sha256 at build
          # time without duplicating per-Dockerfile constants.
          mkdir -p .build-context
          cp "$SOCKET_TOOL_CHECKSUMS_FILE" .build-context/registry-tools.json

      - name: Build Node.js smol with Depot.dev runner (Linux - Release binary only, no checkpoint)
        if: matrix.os == 'linux' && steps.restore-checkpoint.outputs.build-required != 'false'
        uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # v1.17.0
        with:
          project: 8fpj9495vw
          platforms: linux/${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}
          build-args: |
            BUILD_MODE=${{ steps.build-mode.outputs.mode }}
            MATRIX_PLATFORM=${{ matrix.platform }}
            MATRIX_ARCH=${{ matrix.arch }}
            MATRIX_LIBC=${{ matrix.libc }}
            PLATFORM_ARCH=${{ steps.platform-arch.outputs.platform_arch }}
          secrets: |
            GITHUB_TOKEN=${{ github.token }}
          no-cache: ${{ inputs.force == true }}
          file: packages/node-smol-builder/docker/Dockerfile.${{ matrix.libc || 'glibc' }}-released
          target: export
          outputs: type=local,dest=packages/node-smol-builder/build
          context: .

      - name: Verify Depot.dev release output (Linux)
        if: success() && matrix.os == 'linux' && steps.restore-checkpoint.outputs.build-required != 'false'
        shell: bash
        env:
          OUT_DIR: ${{ steps.paths.outputs.out_dir }}
          RELEASE_BINARY: ${{ steps.paths.outputs.release_binary }}
        run: |
          echo "Verifying Depot.dev build output (Release binary)..."
          ls -lah "${OUT_DIR}/"

          # Check if Release node binary exists.
          if [ ! -f "${RELEASE_BINARY}" ]; then
            echo "× Release node binary not found!"
            echo "Contents of output directory:"
            find "${OUT_DIR}/" -type f 2>/dev/null || echo "No files found"
            exit 1
          fi
          echo "✅ Release node binary found"
          ls -lh "${RELEASE_BINARY}"

      - name: Continue build from Released checkpoint (Linux - strip, compress, finalize)
        if: |
          matrix.os == 'linux' &&
          ((steps.checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_LIBC: ${{ matrix.libc }}
          PLATFORM_ARCH: ${{ steps.platform-arch.outputs.platform_arch }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Cross-platform timestamp function (GNU date/BusyBox fallback)
          get_timestamp() {
            date +%s 2>/dev/null || python3 -c 'import time; print(int(time.time()))'
          }

          echo "⏱️ Continuing build from Released checkpoint at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          BUILD_START=$(get_timestamp)

          # Continue build from binary-released checkpoint (strip → compress → finalize)
          # This runs natively in GHA where smoke tests work correctly
          LIBC_FLAG=""
          if [ "$MATRIX_LIBC" = "musl" ]; then
            LIBC_FLAG="--libc=musl"
          fi

          if [ "$BUILD_MODE" = "prod" ]; then
            pnpm --filter node-smol-builder build --prod --platform="${MATRIX_PLATFORM}" --arch="${MATRIX_ARCH}" ${LIBC_FLAG} --platform-arch="${PLATFORM_ARCH}" --from-checkpoint=binary-released
          else
            pnpm --filter node-smol-builder build --dev --platform="${MATRIX_PLATFORM}" --arch="${MATRIX_ARCH}" ${LIBC_FLAG} --platform-arch="${PLATFORM_ARCH}" --from-checkpoint=binary-released
          fi

          BUILD_END=$(get_timestamp)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          MINUTES=$((BUILD_DURATION / 60))
          SECONDS=$((BUILD_DURATION % 60))
          printf "⏱️ Post-processing completed in %ds (%02d:%02d)\n" "$BUILD_DURATION" "$MINUTES" "$SECONDS"

      - name: Verify compressed binary exists (Linux)
        if: matrix.os == 'linux'
        shell: bash
        env:
          OUT_DIR: ${{ steps.paths.outputs.out_dir }}
          FINAL_BINARY: ${{ steps.paths.outputs.final_binary }}
        run: |
          echo "Verifying final build output structure..."
          ls -lah "${OUT_DIR}/"

          # Check if Final node binary exists.
          if [ ! -f "${FINAL_BINARY}" ]; then
            echo "× Final node binary not found!"
            echo "Contents of output directory:"
            find "${OUT_DIR}/" -type f
            exit 1
          fi
          echo "✅ Final node binary found"
          ls -lh "${FINAL_BINARY}"

      # Note: Depot.dev builds use --build-only which skips checkpoint creation.
      # Checkpoints are created after the build by GHA (strip, compress, finalize).

      - name: Build Node.js smol with GitHub runner (macOS/Windows)
        # Skip entirely when a downstream checkpoint already restored (build-required=false).
        # The inner Linux guard stays because Linux uses Depot.dev above; this `if` only
        # prevents a pointless runner spin-up when the finalized tarball is already in cache.
        if: matrix.os != 'linux' && steps.restore-checkpoint.outputs.build-required != 'false'
        shell: bash
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_CROSS_COMPILE: ${{ matrix.cross_compile }}
          PLATFORM_ARCH: ${{ steps.platform-arch.outputs.platform_arch }}
          BUILD_JOBS: ${{ steps.build-parallelism.outputs.jobs }}
          GITHUB_TOKEN: ${{ github.token }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          # Defense-in-depth: the `if:` above already filters Linux out, but
          # keep this so someone running locally with ACT (which doesn't eval
          # the step `if:`) still does the right thing.
          if [ "$MATRIX_OS" = "linux" ]; then
            echo "Skipping: Linux builds use Depot.dev"
            exit 0
          fi
          echo "Building for $MATRIX_PLATFORM-$MATRIX_ARCH (mode: $BUILD_MODE)"

          # Cross-platform timestamp function (GNU date/BusyBox fallback)
          get_timestamp() {
            date +%s 2>/dev/null || python3 -c 'import time; print(int(time.time()))'
          }

          echo "⏱️ Build started at $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          BUILD_START=$(get_timestamp)

          # Cross-compilation compiler flags. MATRIX_PLATFORM / MATRIX_ARCH
          # come from the step's env: block above; MATRIX_CROSS_COMPILE is
          # surfaced here too so all matrix reads are via shell variables
          # rather than template interpolation.
          if [ "$MATRIX_PLATFORM" = "win32" ]; then
            # Windows builds: use clang with MSVC target
            export CC="clang"
            export CXX="clang++"
            if [ "$MATRIX_ARCH" = "arm64" ]; then
              export CFLAGS="--target=aarch64-pc-windows-msvc"
              export CXXFLAGS="--target=aarch64-pc-windows-msvc"
              export LDFLAGS="--target=aarch64-pc-windows-msvc"
            else
              # x64 uses default MSVC target
              export CFLAGS="-m64"
              export CXXFLAGS="-m64"
              export LDFLAGS="-m64"
            fi
          elif [ "$MATRIX_PLATFORM" = "darwin" ] && [ "$MATRIX_CROSS_COMPILE" = "true" ]; then
            # macOS cross-compilation: ARM64 host building for x64
            export CC="clang -arch x86_64"
            export CXX="clang++ -arch x86_64"
          fi

          CROSS_FLAG=""
          if [ "$MATRIX_CROSS_COMPILE" = "true" ]; then
            CROSS_FLAG="--allow-cross"
          fi

          if [ "$BUILD_MODE" = "prod" ]; then
            pnpm --filter node-smol-builder build --prod --platform="${MATRIX_PLATFORM}" --arch="${MATRIX_ARCH}" --platform-arch="${PLATFORM_ARCH}" $CROSS_FLAG
          else
            pnpm --filter node-smol-builder build --dev --platform="${MATRIX_PLATFORM}" --arch="${MATRIX_ARCH}" --platform-arch="${PLATFORM_ARCH}" $CROSS_FLAG
          fi

          BUILD_END=$(get_timestamp)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          # Note: date +%s requires GNU date (available on GitHub Actions runners: ubuntu, macos, windows)
          # Not portable to busybox (Alpine) or pure BSD systems without GNU coreutils
          # Time formatting uses pure POSIX arithmetic for maximum portability
          HOURS=$((BUILD_DURATION / 3600))
          MINUTES=$(((BUILD_DURATION % 3600) / 60))
          SECONDS=$((BUILD_DURATION % 60))
          printf "⏱️ Build completed in %ds (%02d:%02d:%02d)\n" "$BUILD_DURATION" "$HOURS" "$MINUTES" "$SECONDS"

      - name: Verify binary structure and dependencies
        if: success() && steps.restore-checkpoint.outputs.build-required != 'false'
        shell: bash
        env:
          BINARY: ${{ steps.paths.outputs.final_binary }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          # Check binary exists
          if [ ! -f "$BINARY" ]; then
            echo "× Binary not found: $BINARY"
            exit 1
          fi

          echo "✅ Binary exists: $BINARY"

          # Show binary info
          if [ "$MATRIX_OS" = "macos" ]; then
            file "$BINARY"
            otool -L "$BINARY" || true
          elif [ "$MATRIX_OS" = "linux" ]; then
            file "$BINARY"
            ldd "$BINARY" || true
          elif [ "$MATRIX_OS" = "windows" ]; then
            file "$BINARY" || true
          fi

      - name: Smoke test binary (execute and verify)
        if: success() && steps.restore-checkpoint.outputs.build-required != 'false'
        shell: bash
        env:
          BINARY: ${{ steps.paths.outputs.final_binary }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_LIBC: ${{ matrix.libc }}
        run: |
          # Prepare smoke test options.
          SMOKE_TEST_ARGS="$BINARY"
          if [ "$MATRIX_ARCH" = "arm64" ]; then
            SMOKE_TEST_ARGS="$SMOKE_TEST_ARGS --arch arm64"
          fi
          if [ "$MATRIX_LIBC" = "musl" ]; then
            SMOKE_TEST_ARGS="$SMOKE_TEST_ARGS --musl"
          fi

          echo "Running smoke test: node packages/build-infra/scripts/smoke-test-binary.mts $SMOKE_TEST_ARGS"
          node packages/build-infra/scripts/smoke-test-binary.mts $SMOKE_TEST_ARGS

      - name: Collect build metrics
        if: always()
        shell: bash
        # Single env: block. A previous edit had a second env: later in the
        # step, which YAML silently collapses into one map — whichever key
        # YAML picked (implementation-defined), the others were dropped.
        # Concretely MATRIX_OS was lost and the Windows branch never ran.
        env:
          MATRIX_OS: ${{ matrix.os }}
          BINARY: ${{ steps.paths.outputs.final_binary }}
        run: |
          if [ -f "${BINARY}" ]; then
            if [ "$MATRIX_OS" = "windows" ]; then
              # Convert Unix path to Windows format for PowerShell
              BINARY_SIZE_MB=$(powershell -NoProfile -Command "\$winPath = '${BINARY}' -replace '/', '\\'; [math]::Round((Get-Item \$winPath).Length / 1MB, 2)")
            else
              # Use platform-specific stat command (BSD/macOS vs GNU/Linux)
              if [ "$(uname)" = "Darwin" ]; then
                BINARY_SIZE=$(stat -f%z "${BINARY}")
              else
                BINARY_SIZE=$(stat -c%s "${BINARY}")
              fi
              BINARY_SIZE_MB=$(echo "scale=2; $BINARY_SIZE / 1024 / 1024" | bc 2>/dev/null || awk "BEGIN {printf \"%.2f\", $BINARY_SIZE / 1024 / 1024}")
            fi
            echo "✅ Binary size: ${BINARY_SIZE_MB} MB"
            echo "binary_size_mb=${BINARY_SIZE_MB}" >> $GITHUB_OUTPUT
          else
            echo "× Binary not found: ${BINARY}"
          fi

      - name: Set artifact name
        shell: bash
        env:
          PLATFORM_ARCH: ${{ steps.platform-arch.outputs.platform_arch }}
        run: |
          # Use platform-arch output (win32→win conversion already done).
          ARTIFACT_NAME="node-smol-${PLATFORM_ARCH}"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload Node.js smol artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ steps.paths.outputs.final_binary }}
          retention-days: 30
          if-no-files-found: error
          # The node binary is already compressed (UPX + zstd stub). Let
          # upload-artifact skip its gzip pass — zero-to-negative savings
          # on incompressible content, and gzip level 6 costs 10–20% extra
          # upload CPU. Matches the curl/lief/stubs tarball uploads.
          compression-level: 0

      - name: Cleanup before cache save
        if: always()
        shell: bash
        env:
          OUT_DIR: ${{ steps.paths.outputs.source_out_dir }}
        run: |
          if [ -d "$OUT_DIR" ]; then
            echo "Removing build artifacts from source before cache save..."
            rm -rf "$OUT_DIR"
            echo "✅ Cleaned $OUT_DIR (prevents caching ~4GB of build artifacts)"
          fi

  release:
    name: Release Node.js smol
    needs: build
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    environment: release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write # Required to create GitHub releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .node-version
            .github/scripts/generate-version.sh
          sparse-checkout-cone-mode: false

      - name: Load Node.js version from .node-version
        id: tool-versions
        run: |
          NODE_VERSION=$(cat .node-version | tr -d '\n')
          echo "node-version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "Loaded Node.js: $NODE_VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts/
          pattern: node-smol-*

      - name: Validate artifact count
        run: |
          # Expected artifacts: 8 (darwin-arm64, darwin-x64, linux-x64, linux-arm64, linux-x64-musl, linux-arm64-musl, win-x64, win-arm64)
          EXPECTED_COUNT=8
          ACTUAL_COUNT=$(find artifacts -mindepth 1 -maxdepth 1 -type d | wc -l)
          if [ "$ACTUAL_COUNT" -ne "$EXPECTED_COUNT" ]; then
            echo "Error: Expected $EXPECTED_COUNT artifacts, found $ACTUAL_COUNT"
            echo "Downloaded artifacts:"
            ls -la artifacts/
            exit 1
          fi
          echo "✓ All $EXPECTED_COUNT artifacts downloaded successfully"

      - name: Organize release assets
        run: |
          mkdir -p packages/node-smol-builder/dist

          # Darwin ARM64
          mv artifacts/node-smol-darwin-arm64/node packages/node-smol-builder/dist/node-darwin-arm64

          # Darwin x64
          mv artifacts/node-smol-darwin-x64/node packages/node-smol-builder/dist/node-darwin-x64

          # Linux x64
          mv artifacts/node-smol-linux-x64/node packages/node-smol-builder/dist/node-linux-x64

          # Linux ARM64
          mv artifacts/node-smol-linux-arm64/node packages/node-smol-builder/dist/node-linux-arm64

          # Linux musl x64
          mv artifacts/node-smol-linux-x64-musl/node packages/node-smol-builder/dist/node-linux-x64-musl

          # Linux musl ARM64
          mv artifacts/node-smol-linux-arm64-musl/node packages/node-smol-builder/dist/node-linux-arm64-musl

          # Windows x64
          mv artifacts/node-smol-win-x64/node.exe packages/node-smol-builder/dist/node-win-x64.exe

          # Windows ARM64 (cross-compiled)
          mv artifacts/node-smol-win-arm64/node.exe packages/node-smol-builder/dist/node-win-arm64.exe

          # Make Unix binaries executable. The prior `node-*[!.exe]` glob
          # used a single-character negated class which matches any char
          # NOT in {.,e,x,e} — it worked by accident because `node-*.exe`
          # happens to end in `e`, but a future filename ending in `e` or
          # `x` (e.g. `node-darwin-arm64e`) would be silently skipped.
          # Explicit exclusion via find is readable and correct.
          find packages/node-smol-builder/dist -name 'node-*' -not -name '*.exe' -type f -exec chmod +x {} +

      - name: Validate all platform binaries exist
        shell: bash
        run: |
          REQUIRED_FILES=(
            "node-darwin-arm64"
            "node-darwin-x64"
            "node-linux-x64"
            "node-linux-arm64"
            "node-linux-x64-musl"
            "node-linux-arm64-musl"
            "node-win-x64.exe"
            "node-win-arm64.exe"
          )

          MISSING=()
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "packages/node-smol-builder/dist/$file" ]; then
              MISSING+=("$file")
            fi
          done

          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "× Missing required binaries:"
            printf '%s\n' "${MISSING[@]}"
            exit 1
          fi

          echo "✅ All platform binaries present"
          ls -lh packages/node-smol-builder/dist/

      - name: Generate version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Validate script exists before sourcing
          if [ ! -f .github/scripts/generate-version.sh ]; then
            echo "Error: generate-version.sh not found"
            exit 1
          fi
          source .github/scripts/generate-version.sh
          # Validate VERSION was set by the script
          if [ -z "$VERSION" ]; then
            echo "Error: VERSION not set by generate-version.sh"
            exit 1
          fi
          RELEASE_NAME="node-smol"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Release: $RELEASE_NAME"
          TAG="${RELEASE_NAME}-${VERSION}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate checksums
        if: steps.version.outputs.skip != 'true'
        shell: bash
        run: |
          cd packages/node-smol-builder/dist

          # Use sha256sum on Windows/Linux, shasum on macOS
          if command -v shasum &> /dev/null; then
            shasum -a 256 node-* > checksums.txt
          elif command -v sha256sum &> /dev/null; then
            sha256sum node-* > checksums.txt
          else
            echo "Error: No SHA-256 command found"
            exit 1
          fi

          cat checksums.txt

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}
          STEPS_VERSION_OUTPUTS_RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          STEPS_NODE_VERSION_OUTPUTS_NODE_VERSION: ${{ steps.tool-versions.outputs.node-version }}
        run: |
          VERSION="${STEPS_VERSION_OUTPUTS_VERSION}"
          RELEASE_NAME="${STEPS_VERSION_OUTPUTS_RELEASE_NAME}"
          NODE_VERSION="${STEPS_NODE_VERSION_OUTPUTS_NODE_VERSION}"
          TAG="${RELEASE_NAME}-${VERSION}"

          echo "Creating new release $TAG..."
          gh release create "$TAG" \
            --title "${RELEASE_NAME} ${VERSION}" \
            --notes "Node.js v${NODE_VERSION} minimal binaries for all platforms.

          ## Platforms
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64
          - linux-arm64-musl
          - linux-x64-musl
          - win-arm64
          - win-x64

          ## Files
          - \`node-darwin-arm64\` - macOS Apple Silicon
          - \`node-darwin-x64\` - macOS Intel
          - \`node-linux-arm64\` - Linux ARM64 (glibc)
          - \`node-linux-x64\` - Linux x64 (glibc)
          - \`node-linux-arm64-musl\` - Linux ARM64 (musl/Alpine)
          - \`node-linux-x64-musl\` - Linux x64 (musl/Alpine)
          - \`node-win-arm64.exe\` - Windows ARM64
          - \`node-win-x64.exe\` - Windows x64
          - \`checksums.txt\` - SHA256 checksums

          ## Usage
          Download the appropriate binary for your platform and run it:
          \`\`\`bash
          ./node-darwin-arm64 script.js
          \`\`\`" \
            packages/node-smol-builder/dist/node-* \
            packages/node-smol-builder/dist/checksums.txt

  update-checksums:
    needs: release
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    permissions:
      contents: write # release-assets.json commit after publishing GitHub release
    uses: ./.github/workflows/update-checksums.yml
    secrets:
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
