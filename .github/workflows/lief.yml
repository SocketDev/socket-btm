name: SMOL 1. LIEF

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no release)'
        type: boolean
        default: true
      force:
        description: 'Force rebuild (ignore cache)'
        type: boolean
        default: false
      build_mode:
        description: 'Build mode'
        type: choice
        options:
          - prod
          - dev
        default: prod
      debug:
        description: 'Debug (0|1|namespace[,...])'
        type: string
        default: '0'
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: true
      force:
        type: boolean
        default: false
      build_mode:
        type: string
        default: prod
      debug:
        type: string
        default: '0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-lief:
    permissions:
      contents: read
      id-token: write # OIDC authentication for Depot builds
    name: lief / ${{ matrix.platform == 'win32' && 'win' || matrix.platform }}-${{ matrix.arch }}${{ matrix.libc == 'musl' && '-musl' || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS builds
          # Use Depot runner for darwin-arm64: 8 vCPU M2, 24GB RAM
          - runner: depot-macos-15
            platform: darwin
            arch: arm64
            os: macos
          # Use Depot runner for darwin-x64 too. macos-15-large is ARM64
          # despite the historical assumption, and running x86_64 pnpm
          # under Rosetta caused the standalone-pnpm bootstrap to fail
          # silently (empty node_modules, install-action resolvability
          # guard exit-1). depot-macos-15 is what every other builder
          # workflow uses for both arches and it works there; match.
          - runner: depot-macos-15
            platform: darwin
            arch: x64
            os: macos
          # Linux builds (glibc)
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            os: linux
            libc: glibc
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            os: linux
            libc: glibc
          # Linux builds (musl)
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            os: linux
            libc: musl
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            os: linux
            libc: musl
          # Windows builds
          - runner: windows-2022
            platform: win32
            arch: x64
            os: windows
          - runner: windows-2022
            platform: win32
            arch: arm64
            os: windows
            cross_compile: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Don't clone all submodules - only lief and lzfse are initialized below.
          submodules: false

      - name: Enable debug logging
        uses: ./.github/actions/enable-debug-logging
        with:
          debug: ${{ inputs.debug }}

      - uses: SocketDev/socket-registry/.github/actions/setup@0fc1abfd5e9ae4396f9fb507371aeea75e2f412c # main

      - uses: SocketDev/socket-registry/.github/actions/install@0fc1abfd5e9ae4396f9fb507371aeea75e2f412c # main

      - name: Load cache version from centralized config
        id: cache-version
        uses: ./.github/actions/load-cache-version
        with:
          package-name: lief

      - name: Generate LIEF cache key
        id: cache-key
        env:
          CACHE_VERSION: ${{ steps.cache-version.outputs.version }}
          LIBC: ${{ matrix.libc || 'glibc' }}
        shell: bash
        run: |
          # Cross-platform hash function.
          if command -v shasum &> /dev/null; then
            hash_cmd="shasum -a 256"
          elif command -v sha256sum &> /dev/null; then
            hash_cmd="sha256sum"
          else
            echo "Error: No SHA-256 command found"
            exit 1
          fi

          # Hash critical inputs.
          # Use libc-specific Dockerfile (glibc or musl) for Linux only.
          # macOS/Windows don't use Docker, so skip Dockerfile hashing to avoid
          # unnecessary cache invalidation when only the Dockerfile changes.
          DOCKERFILE_NAME="Dockerfile.${LIBC}"
          DOCKERFILE_PATH="packages/lief-builder/docker/${DOCKERFILE_NAME}"
          if [ -f "$DOCKERFILE_PATH" ]; then
            DOCKERFILE_HASH=$($hash_cmd "$DOCKERFILE_PATH" | cut -d' ' -f1)
          else
            DOCKERFILE_HASH="no-docker"
          fi
          # Hash the whole scripts/ tree — build.mts is not the only file
          # that influences the output. `verify-release.mts` runs during
          # build (line 393) and `get-checkpoint-chain.mts` is read to
          # compute the chain (line 213). Missing them from the key means
          # edits to verification or chain logic silently hit stale cache.
          # Use find so a new script added under scripts/ is picked up
          # without editing the key composition.
          BUILD_SCRIPTS_HASH=$(find packages/lief-builder/scripts -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          # Patches applied to LIEF during the build change the produced
          # library; previously missed by the cache key.
          PATCHES_HASH=$(find packages/lief-builder/patches -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          # lief-builder/make/lief.mk exports LIEF_CFLAGS / LIEF_DEFINES
          # for downstream builders. Not strictly read by this workflow,
          # but an edit there must still invalidate cache so downstream
          # consumers see consistent state.
          MAKE_HASH=$(find packages/lief-builder/make -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          # Shared TS helpers, workspace lock, and Node version — every
          # builder's scripts import from build-infra/lib, Docker builds
          # install from pnpm-lock.yaml, and the Dockerfile's base image
          # uses .node-version. Previously missed by this cache key.
          BUILD_INFRA_LIB=$(find packages/build-infra/lib -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          BIN_INFRA_LIB=$(find packages/bin-infra/lib -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          # Foundational toolchain pins + cross-package build scripts. Per
          # validate-cache-versions CASCADE_RULES these are ALL_DOWNSTREAM —
          # a bump must invalidate every builder's cache. Mirrors the stubs/
          # curl/iocraft/opentui coverage.
          BUILD_INFRA_EXTERNAL_TOOLS=$($hash_cmd packages/build-infra/external-tools.json 2>/dev/null | cut -d' ' -f1)
          BUILD_INFRA_SCRIPTS=$(find packages/build-infra/scripts -type f 2>/dev/null | LC_COLLATE=C sort -u | xargs $hash_cmd 2>/dev/null | $hash_cmd | cut -d' ' -f1)
          PNPM_LOCK_HASH=$($hash_cmd pnpm-lock.yaml 2>/dev/null | cut -d' ' -f1)
          NODE_VERSION_HASH=$($hash_cmd .node-version 2>/dev/null | cut -d' ' -f1)
          # Use git ls-tree HEAD so the cache key can be computed WITHOUT
          # the submodule being initialized — the SHA is the gitlink
          # already recorded in HEAD. Mirrors node-smol/iocraft/yoga/
          # onnxruntime/opentui and unblocks gating the submodule init
          # step on cache-miss.
          LIEF_SUBMODULE_SHA=$(git ls-tree HEAD packages/lief-builder/upstream/lief 2>/dev/null | awk '{print $3}')
          # lief Dockerfiles COPY root package.json + pnpm-workspace.yaml
          # (catalog versions / overrides / trustPolicy / minimumReleaseAge).
          # Edits there change what `pnpm install` resolves inside the
          # Docker build. Unhashed before R24.
          ROOT_PACKAGE_JSON=$($hash_cmd package.json 2>/dev/null | cut -d' ' -f1)
          PNPM_WORKSPACE=$($hash_cmd pnpm-workspace.yaml 2>/dev/null | cut -d' ' -f1)
          # Per-package package.json defense-in-depth — holds devDeps
          # and future source pins specific to lief-builder. Captured
          # transitively by pnpm-lock today but hashing directly keeps
          # cache-key composition uniform across all workflows.
          LIEF_PACKAGE_JSON=$($hash_cmd packages/lief-builder/package.json 2>/dev/null | cut -d' ' -f1)
          # Socket-registry propagation SHA — extracted from THIS
          # workflow's own YAML at runtime, not via a catalog lookup.
          # A registry cascade bump (which edits the @<sha> pin in
          # this file) flows through to a cache-key change here, so
          # the checkpoint cache invalidates whenever the registry
          # provisions a new pnpm version / zizmor build / etc. That
          # makes .build-context/registry-tools.json — whose contents
          # are materialized per-run from SOCKET_TOOL_CHECKSUMS_FILE
          # — implicitly part of the cache key.
          WORKFLOW_FILE="${GITHUB_WORKFLOW_REF%@*}"
          WORKFLOW_FILE="${WORKFLOW_FILE#${GITHUB_REPOSITORY}/}"
          SOCKET_REGISTRY_SHA=$(grep -ohE 'SocketDev/socket-registry/[^@]+@[0-9a-f]{40}' "$WORKFLOW_FILE" 2>/dev/null | head -1 | grep -oE '[0-9a-f]{40}$' || echo "")

          # Finalized checkpoint hash.
          FINAL_HASH=$(echo "${CACHE_VERSION}${DOCKERFILE_HASH}${BUILD_SCRIPTS_HASH}${PATCHES_HASH}${MAKE_HASH}${BUILD_INFRA_LIB}${BIN_INFRA_LIB}${BUILD_INFRA_EXTERNAL_TOOLS}${BUILD_INFRA_SCRIPTS}${PNPM_LOCK_HASH}${NODE_VERSION_HASH}${LIEF_SUBMODULE_SHA}${LIBC}${ROOT_PACKAGE_JSON}${PNPM_WORKSPACE}${LIEF_PACKAGE_JSON}${SOCKET_REGISTRY_SHA}" | $hash_cmd | cut -d' ' -f1)

          echo "cache_version=${CACHE_VERSION}" >> $GITHUB_OUTPUT
          echo "final_hash=${FINAL_HASH}" >> $GITHUB_OUTPUT
          echo "Cache key hash: ${FINAL_HASH}"

      - name: Set build mode
        id: build-mode
        uses: ./.github/actions/set-build-mode
        with:
          build-mode: ${{ inputs.build_mode }}

      - name: Set platform-arch for cache
        id: platform-arch-cache
        uses: ./.github/actions/set-platform-arch
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          libc: ${{ matrix.libc }}

      # Hoist canonical lief paths into step outputs so subsequent steps
      # (verify, archive, debug listings) read from one place. Mirrors the
      # binsuite layout that bin-infra/lib/builder.mts produces — the path
      # MUST stay byte-for-byte identical to that builder's output.
      - name: Compute lief paths
        id: paths
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          PLATFORM_ARCH: ${{ steps.platform-arch-cache.outputs.platform_arch }}
        run: |
          PACKAGE_DIR="packages/lief-builder"
          MODE_BUILD_DIR="${PACKAGE_DIR}/build/${BUILD_MODE}"
          PLATFORM_BUILD_DIR="${MODE_BUILD_DIR}/${PLATFORM_ARCH}"
          FINAL_DIR="${PLATFORM_BUILD_DIR}/out/Final"
          LIEF_DIR="${FINAL_DIR}/lief"
          CHECKPOINTS_DIR="${PLATFORM_BUILD_DIR}/checkpoints"
          {
            echo "package_dir=${PACKAGE_DIR}"
            echo "mode_build_dir=${MODE_BUILD_DIR}"
            echo "platform_build_dir=${PLATFORM_BUILD_DIR}"
            echo "final_dir=${FINAL_DIR}"
            echo "lief_dir=${LIEF_DIR}"
            echo "checkpoints_dir=${CHECKPOINTS_DIR}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore LIEF checkpoint cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: lief-checkpoint-cache
        if: ${{ !inputs.force }}
        with:
          path: |
            packages/lief-builder/build/shared/checkpoints
            ${{ steps.paths.outputs.checkpoints_dir }}
          key: lief-checkpoints-${{ steps.cache-key.outputs.cache_version }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.libc && format('-{0}', matrix.libc) || '' }}-${{ steps.build-mode.outputs.mode }}-${{ steps.cache-key.outputs.final_hash }}
          # NOTE: No restore-keys - we require exact match to prevent stale cache restoration.
          # Partial matches with restore-keys cause builds to use outdated artifacts when
          # source changes bump the final_hash but the prefix still matches.

      - name: Set checkpoint chain for build mode
        id: checkpoint-chain
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
        shell: bash
        run: |
          # Use get-checkpoint-chain.mts for consistency.
          CHAIN=$(node packages/lief-builder/scripts/get-checkpoint-chain.mts --$BUILD_MODE)
          echo "checkpoint_chain=$CHAIN" >> $GITHUB_OUTPUT
          # Convert comma-separated to space-separated for validation.
          CHECKPOINTS=$(echo "$CHAIN" | tr ',' ' ')
          echo "checkpoints=$CHECKPOINTS" >> $GITHUB_OUTPUT
          echo "Checkpoint chain for $BUILD_MODE mode: $CHAIN"

      - name: Validate checkpoint cache integrity
        id: validate-cache
        if: steps.lief-checkpoint-cache.outputs.cache-hit == 'true'
        uses: ./.github/actions/validate-checkpoints
        with:
          checkpoint-dirs: packages/lief-builder/build/shared/checkpoints:${{ steps.paths.outputs.checkpoints_dir }}
          checkpoints: ${{ steps.checkpoint-chain.outputs.checkpoints }}
          package-name: lief-builder

      - name: Restore build output from checkpoint chain
        id: restore-checkpoint
        uses: ./.github/actions/restore-checkpoint
        with:
          package-name: 'lief-builder'
          build-mode: ${{ steps.build-mode.outputs.mode }}
          checkpoint-chain: ${{ steps.checkpoint-chain.outputs.checkpoint_chain }}
          cache-hit: ${{ steps.lief-checkpoint-cache.outputs.cache-hit }}
          cache-valid: ${{ steps.validate-cache.outputs.valid }}
          platform-arch: ${{ steps.platform-arch-cache.outputs.platform_arch }}

      - name: Initialize LIEF submodule
        # Cache-miss only: the cache-key uses `git ls-tree HEAD` so the
        # submodule does not need to be initialized to compute it. R9
        # unblocked this change by switching the SHA extraction.
        if: (steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') || steps.restore-checkpoint.outputs.build-required == 'true' || inputs.force
        uses: ./.github/actions/init-submodules
        with:
          submodules: packages/lief-builder/upstream/lief

      - name: Setup Depot CLI
        # Skip the CLI download on cache-hit — if the finalized checkpoint
        # is already in cache no Depot build runs. Saves ~5-10s per Linux
        # matrix entry on fully-cached runs.
        if: matrix.os == 'linux' && (steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false' || steps.restore-checkpoint.outputs.build-required != 'false' || inputs.force)
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1
        with:
          oidc: true

      - name: Stage registry tool-checksums for Docker build context
        if: |
          matrix.os == 'linux' &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        run: |
          # Socket-registry's setup action exports SOCKET_TOOL_CHECKSUMS_FILE
          # pointing at a stable on-runner copy of external-tools.json.
          # Dockerfiles `COPY .build-context/registry-tools.json …` to
          # resolve pnpm version + per-platform asset + sha256 at build
          # time without duplicating per-Dockerfile constants.
          mkdir -p .build-context
          cp "$SOCKET_TOOL_CHECKSUMS_FILE" .build-context/registry-tools.json

      - name: Build LIEF with Depot (Linux - offloads compute)
        if: |
          matrix.os == 'linux' &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # v1.17.0
        with:
          project: 8fpj9495vw
          platforms: linux/${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}
          build-args: |
            BUILD_MODE=${{ steps.build-mode.outputs.mode }}
            PLATFORM_ARCH=${{ steps.platform-arch-cache.outputs.platform_arch }}
            CACHE_VERSION=${{ steps.cache-version.outputs.version }}
          no-cache: ${{ inputs.force == true }}
          file: packages/lief-builder/docker/Dockerfile.${{ matrix.libc || 'glibc' }}
          target: export
          outputs: type=local,dest=packages/lief-builder/build
          context: .

      - name: Verify Depot build output (Linux)
        if: |
          matrix.os == 'linux' &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        env:
          PLATFORM_BUILD_DIR: ${{ steps.paths.outputs.platform_build_dir }}
          LIEF_DIR: ${{ steps.paths.outputs.lief_dir }}
          PACKAGE_DIR: ${{ steps.paths.outputs.package_dir }}
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
        run: |
          echo "Verifying Depot build output structure..."
          ls -lah "${PLATFORM_BUILD_DIR}/" || ls -lah "${PACKAGE_DIR}/build/${BUILD_MODE}/"

          # Check for library file.
          if [ -f "${LIEF_DIR}/libLIEF.a" ]; then
            echo "✅ libLIEF.a found"
          elif [ -f "${LIEF_DIR}/LIEF.lib" ]; then
            echo "✅ LIEF.lib found"
          else
            echo "× LIEF library not found!"
            echo "Contents of output directory:"
            find "${PACKAGE_DIR}/build/${BUILD_MODE}/" -type f 2>/dev/null || echo "No files found"
            exit 1
          fi

      - name: Setup build toolchain (macOS)
        if: |
          matrix.os == 'macos' &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        run: |
          # Retry to handle transient brew/Formulae registry failures.
          for i in 1 2 3; do
            if brew install cmake ccache; then
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "× brew install failed after 3 attempts"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Setup build toolchain (Windows x64)
        if: |
          matrix.os == 'windows' && !matrix.cross_compile &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        run: |
          # Retry up to 3 times to handle transient Chocolatey CDN failures
          for i in 1 2 3; do
            if choco install cmake mingw ccache -y; then
              break
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Setup build toolchain (Windows ARM64 cross-compile)
        if: |
          matrix.os == 'windows' && matrix.cross_compile &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        run: |
          # Retry up to 3 times to handle transient Chocolatey CDN failures
          for i in 1 2 3; do
            if choco install cmake ccache -y; then
              break
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Install llvm-mingw (Windows ARM64 cross-compile)
        if: |
          matrix.os == 'windows' && matrix.cross_compile &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        uses: ./.github/actions/install-llvm-mingw

      - name: Build LIEF native (macOS/Windows)
        if: |
          matrix.os != 'linux' &&
          ((steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true')
        shell: bash
        env:
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          cd packages/lief-builder
          pnpm run build

      # Debug output only needed on cache-miss / invalid / build-required
      # runs. Full cache-hit rounds already have a known-good layout
      # from the restored tarball — walking the tree just to log it
      # wastes I/O across every matrix entry.
      - name: Debug build output structure
        if: |
          (steps.lief-checkpoint-cache.outputs.cache-hit != 'true' || steps.validate-cache.outputs.valid == 'false') ||
          steps.restore-checkpoint.outputs.build-required == 'true'
        shell: bash
        env:
          PLATFORM_BUILD_DIR: ${{ steps.paths.outputs.platform_build_dir }}
          PACKAGE_DIR: ${{ steps.paths.outputs.package_dir }}
          BUILD_MODE: ${{ steps.build-mode.outputs.mode }}
        run: |
          echo "Checking build output structure..."
          echo "Contents of ${PLATFORM_BUILD_DIR}/:"
          ls -lah "${PLATFORM_BUILD_DIR}/" || echo "Build directory does not exist"
          echo ""
          echo "Searching for LIEF library files (libLIEF.a or LIEF.lib):"
          find "${PACKAGE_DIR}/build/${BUILD_MODE}/" -name "libLIEF.a" -o -name "LIEF.lib" 2>/dev/null || echo "No LIEF library files found"
          echo ""
          echo "Complete directory tree:"
          find "${PACKAGE_DIR}/build/${BUILD_MODE}/" -type f 2>/dev/null || echo "No files found"

      - name: Verify release artifacts
        shell: bash
        env:
          LIEF_DIR: ${{ steps.paths.outputs.lief_dir }}
        run: |
          node packages/lief-builder/scripts/verify-release.mts "$LIEF_DIR"

      - name: Create archive
        shell: bash
        env:
          LIEF_DIR: ${{ steps.paths.outputs.lief_dir }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          LIBC: ${{ matrix.libc }}
        run: |
          cd "$LIEF_DIR"

          # Determine library name (platform-specific).
          if [ -f "libLIEF.a" ]; then
            LIB_NAME="libLIEF.a"
          elif [ -f "LIEF.lib" ]; then
            LIB_NAME="LIEF.lib"
          else
            echo "× Error: LIEF library not found in $LIEF_DIR"
            exit 1
          fi

          # Convert win32 → win for file/folder names.
          if [ "${PLATFORM}" = "win32" ]; then
            RELEASE_PLATFORM="win"
          else
            RELEASE_PLATFORM="${PLATFORM}"
          fi

          # Construct archive name (musl suffix after arch).
          ARCHIVE_NAME="lief-${RELEASE_PLATFORM}-${ARCH}"
          if [ "${LIBC}" = "musl" ]; then
            ARCHIVE_NAME="${ARCHIVE_NAME}-musl"
          fi

          # Write the tar.gz up to the mode build dir (4 levels up from the
          # lief subdir of the Final output). Both source and destination
          # are owned by paths step outputs above.
          OUTPUT_PATH="../../../../${ARCHIVE_NAME}.tar.gz"
          echo "Creating archive: ${ARCHIVE_NAME}.tar.gz"
          tar -czf "${OUTPUT_PATH}" \
            ${LIB_NAME} \
            include/

          echo "✅ Archive created successfully"

      - name: Set artifact name
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          LIBC: ${{ matrix.libc }}
        run: |
          # Convert win32 → win for file/folder names.
          if [ "${PLATFORM}" = "win32" ]; then
            RELEASE_PLATFORM="win"
          else
            RELEASE_PLATFORM="${PLATFORM}"
          fi
          # Construct artifact name (musl suffix after arch).
          ARTIFACT_NAME="lief-${RELEASE_PLATFORM}-${ARCH}"
          if [ "${LIBC}" = "musl" ]; then
            ARTIFACT_NAME="${ARTIFACT_NAME}-musl"
          fi
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Verify archive exists
        shell: bash
        env:
          MODE_BUILD_DIR: ${{ steps.paths.outputs.mode_build_dir }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
        run: |
          ARCHIVE_PATH="${MODE_BUILD_DIR}/${ARTIFACT_NAME}.tar.gz"
          if [ ! -f "$ARCHIVE_PATH" ]; then
            echo "× Archive not found at: $ARCHIVE_PATH"
            echo "Contents of build directory:"
            ls -lah "${MODE_BUILD_DIR}/" || echo "Build directory does not exist"
            exit 1
          fi
          echo "✅ Archive found: $ARCHIVE_PATH"
          ls -lh "$ARCHIVE_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ steps.paths.outputs.mode_build_dir }}/${{ env.ARTIFACT_NAME }}.tar.gz
          retention-days: 30
          if-no-files-found: error
          # tar.gz payload is already gzipped — skip re-gzip.
          compression-level: 0

  release:
    name: Release LIEF
    needs: build-lief
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    environment: release
    permissions:
      contents: write # Required to create GitHub releases
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .gitmodules
            .github/scripts/generate-version.sh
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: artifacts
          pattern: lief-*
          merge-multiple: true

      - name: Verify downloaded artifacts
        shell: bash
        run: |
          echo "Checking for downloaded artifacts..."
          if [ -d "artifacts" ]; then
            echo "✅ Artifacts directory exists"
            echo "Contents:"
            ls -lah artifacts/
            if [ -n "$(ls -A artifacts/*.tar.gz 2>/dev/null)" ]; then
              echo "✅ Found $(ls artifacts/*.tar.gz 2>/dev/null | wc -l) tar.gz files"
            else
              echo "× No tar.gz files found in artifacts directory"
              exit 1
            fi
          else
            echo "× Artifacts directory does not exist"
            echo "This means no artifacts were uploaded by the build jobs."
            exit 1
          fi

      - name: Get LIEF version
        id: version
        shell: bash
        run: |
          # Extract version from .gitmodules comment (canonical source)
          LIEF_VERSION=$(grep -B 1 'packages/lief-builder/upstream/lief' .gitmodules | grep '# lief-' | sed 's/.*# lief-//')
          if [ -z "$LIEF_VERSION" ]; then
            echo "Error: Failed to extract LIEF version from .gitmodules"
            exit 1
          fi
          echo "version=${LIEF_VERSION}" >> $GITHUB_OUTPUT
          echo "LIEF version: ${LIEF_VERSION}"

      - name: Generate release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          source .github/scripts/generate-version.sh
          TAG="lief-${VERSION}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          LIEF_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          # Move artifacts to release directory.
          mkdir -p release
          for file in artifacts/*.tar.gz; do
            if [ -f "$file" ]; then
              mv "$file" release/
            fi
          done

          # Verify we have artifacts to release.
          if [ -z "$(ls -A release/*.tar.gz 2>/dev/null)" ]; then
            echo "Error: No .tar.gz files found in release directory after moving from artifacts"
            exit 1
          fi

          echo "Found $(ls release/*.tar.gz | wc -l) archives to release"

          # Generate checksums
          cd release
          if command -v shasum &> /dev/null; then
            shasum -a 256 *.tar.gz > checksums.txt
          elif command -v sha256sum &> /dev/null; then
            sha256sum *.tar.gz > checksums.txt
          else
            echo "Error: No SHA-256 command found"
            exit 1
          fi
          cat checksums.txt
          cd ..

          # Create release (extract date-hash from tag for title).
          TITLE_SUFFIX="${RELEASE_TAG#lief-}"
          gh release create "${RELEASE_TAG}" \
            --title "lief ${TITLE_SUFFIX}" \
            --notes "LIEF v${LIEF_VERSION} library for binary parsing and manipulation.

          ## Platforms
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64
          - linux-arm64-musl
          - linux-x64-musl
          - win-arm64
          - win-x64

          ## Files
          Each platform archive contains:
          - Static library (\`libLIEF.a\` or \`LIEF.lib\`)
          - Header files (\`include/\` directory)
          - \`checksums.txt\` - SHA256 checksums

          ## Usage
          Download the appropriate archive for your platform and extract:

          \`\`\`sh
          tar -xzf lief-<platform>-<arch>.tar.gz
          # Or for musl:
          tar -xzf lief-<platform>-<arch>-musl.tar.gz
          \`\`\`" \
            release/*.tar.gz \
            release/checksums.txt

  update-checksums:
    needs: release
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    permissions:
      contents: write # release-assets.json commit after publishing GitHub release
    uses: ./.github/workflows/update-checksums.yml
    secrets:
      BOT_GPG_PRIVATE_KEY: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
