name: Install llvm-mingw
description: Downloads llvm-mingw and prepends it to PATH — Windows ARM64 cross-compilation. Cached per version.

inputs:
  version:
    description: 'llvm-mingw release date tag (e.g. "20250528")'
    required: false
    default: '20250528'

runs:
  using: composite
  steps:
    - name: Restore llvm-mingw cache
      id: llvm-mingw-cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: C:/llvm-mingw
        key: llvm-mingw-${{ inputs.version }}-ucrt-x86_64

    - name: Download llvm-mingw (cache miss only)
      if: steps.llvm-mingw-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        LLVM_MINGW_VERSION: ${{ inputs.version }}
      run: |
        # Download and extract llvm-mingw for ARM64 cross-compilation.
        # Release tag is a date stamp; see https://github.com/mstorsjo/llvm-mingw/releases.
        ARCHIVE="llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-x86_64.zip"
        curl -fsSL -o llvm-mingw.zip \
          "https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/${ARCHIVE}"
        7z x llvm-mingw.zip -o"C:/llvm-mingw"
        rm -f llvm-mingw.zip

    - name: Prepend llvm-mingw to PATH
      shell: bash
      env:
        LLVM_MINGW_VERSION: ${{ inputs.version }}
      # zizmor flags GITHUB_PATH writes as potential code-execution vectors
      # because the prepended directory's binaries are shadowed onto later
      # steps. Here that's the intent: this action exists to install the
      # cross-compiler and make it the first `aarch64-w64-mingw32-clang` on
      # PATH. The path comes from a literal string plus a pinned action input,
      # not from user-influenced context — no external attacker can change
      # which directory gets prepended.
      run: |
        # Suppression configured in .github/zizmor.yml (github-env: ignore).
        echo "C:/llvm-mingw/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-x86_64/bin" >> $GITHUB_PATH
