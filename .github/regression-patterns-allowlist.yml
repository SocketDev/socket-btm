# Regression-patterns allowlist for check-regression-patterns.mts.
#
# Each entry opts a specific file+line out of one of the recurring
# bug-shape (regex) checks defined in scripts/check-regression-patterns.mts.
# "Pattern" here means a regex pattern / code shape — nothing to do with
# JS/TS class definitions.
#
# Entries require a `reason` field so future readers can audit whether
# the exception is still valid — when it's not, the entry (and the
# underlying code) should be updated, not the regex loosened.
#
# Format:
#   - file: <path relative to repo root>
#     line: <optional line number; omit to exempt the whole file>
#     pattern: <pattern id from scripts/check-regression-patterns.mts>
#     reason: <one-paragraph justification>
#
# The parser is intentionally tiny (see loadAllowlist in
# check-regression-patterns.mts); keep entries flat and one-key-per-line.

- file: .claude/skills/scanning-quality/SKILL.md
  line: 15
  pattern: docs-pnpm-run-nonexistent
  reason: "`pnpm run fleet-skill` is the canonical script in socket-repo-template (scripts/run-skill-fleet.mts), used to dispatch a skill across every fleet repo headlessly. socket-btm doesn't define this script locally because it's not the fleet driver — the SKILL.md text accurately documents how the skill is invoked from socket-repo-template. Pre-existing template-canonical text — every fleet repo's copy hits this same false positive."

- file: packages/node-smol-builder/additions/source-patched/src/socketsecurity/http/http_fast_response.cc
  line: 332
  pattern: cpp-size-overflow-bounds-check
  reason: "`offset + status_len > buffer_size` where all three operands come from server's own code and `buffer_size` is a fixed 512-byte stack buffer (see char header_buf[512] further down). Overflow would require status_len near SIZE_MAX which is impossible from a function-local computation."

