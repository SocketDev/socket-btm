- file: packages/build-infra/src/socketsecurity/build-infra/socket_cacache.h
  line: 152
  pattern: cpp-tmpfile-predictable
  reason: "Windows branch of the cacache write path. On Windows, CI runners are dedicated VMs with no shared-user threat and mkstemp is non-standard. POSIX branch uses mkstemp; this Windows fallback keeps a pid+time pattern which is acceptable under that threat model."
